const SHIP_MODES = [
  {key:'sea',label:'Sea Freight (ทางเรือ)'},
  {key:'air',label:'Air Freight (ทางอากาศ)'},
  {key:'courier',label:'Courier (เอกสาร/พัสดุด่วน)'}

const SEA_TYPES = [
  {key:'LCL',label:"LCL (Less than Container Load)"},
  {key:'FCL20',label:"FCL 20' GP"},
  {key:'FCL40',label:"FCL 40' HQ"}
];
const COURIERS = ['FedEx','DHL','UPS','SF Express'];

// ── มาตรฐาน Transit KPI (Total Lead Time = Transit port-to-port + Customs + Inland) หน่วย=วัน ──
// อ้างอิงจาก Import_Transit_KPI_Standard.xlsx sheet "KPI Standard — FCL/LCL" (ทบทวนล่าสุด ก.ค. 2569
// ดู sheet "Review 2026" ในไฟล์เดียวกันสำหรับปัจจัยฤดูกาล/ความเสี่ยงที่ควรบวกเพิ่ม)
// match = คำที่ค้นใน PORTS_ORIGIN แบบ case-insensitive substring — ครอบคลุม 7 ท่าที่มีข้อมูลยืนยัน
// (ไม่รวม SHANTOU — ยังไม่มีข้อมูลอ้างอิงเฉพาะ จะไม่แสดง KPI ให้ท่านี้เพื่อไม่เดาตัวเลข)
const PORT_KPI = [
  {match:['SHEKOU','NANSHA'],  label:'Shekou / Nansha',      fcl:9,  lcl:12},
  {match:['SHENZHEN'],         label:'Shenzhen (Yantian)',   fcl:11, lcl:14},
  {match:['GUANGZHOU','ZHUHAI'],label:'Guangzhou / Zhuhai',  fcl:12, lcl:15},
  {match:['NINGBO'],           label:'Ningbo',               fcl:14, lcl:17},
  {match:['SHANGHAI'],         label:'Shanghai',             fcl:15, lcl:18},
  {match:['QINGDAO'],          label:'Qingdao',               fcl:16, lcl:19},
  {match:['PUSAN','BUSAN'],    label:'Busan, Korea',         fcl:14, lcl:17}
];
function findPortKpi(origin){
  const o=(origin||'').toUpperCase();
  return PORT_KPI.find(p=>p.match.some(m=>o.includes(m)))||null;
}
// คืนมาตรฐานวัน ตาม origin + ประเภทตู้ (FCL20/FCL40 ถือเป็น FCL เดียวกันตาม Excel, LCL แยก)
function kpiStandardDays(origin,seaType){
  const p=findPortKpi(origin);if(!p)return null;
  return {days:seaType==='LCL'?p.lcl:p.fcl,label:p.label};
}
// Transit Time จริง: ETD -> วันที่รับเข้าคลังจริง (actualDate) + เทียบมาตรฐาน (import + sea เท่านั้น
// เพราะ Excel มาตรฐานครอบคลุมเฉพาะ sea freight ขาเข้า)
function transitInfo(s){
  if(!s||!s.etd||!s.actualDate)return null;
  const d1=new Date(s.etd),d2=new Date(s.actualDate);
  if(isNaN(d1)||isNaN(d2))return null;
  const days=Math.round((d2-d1)/86400000);
  if(days<0)return null;
  const kpi=(s._board==='import'&&s.mode==='sea')?kpiStandardDays(s.origin,s.seaType):null;
  return {days,kpi};
}
function shipModeLabel(s){
  if(s.mode==='air')return 'Air Freight';
  if(s.mode==='courier')return 'Courier'+(s.courierCo?' · '+s.courierCo:'');
  const st=(SEA_TYPES.find(t=>t.key===s.seaType)||{}).label;
  return 'Sea Freight'+(st?' · '+st:'')+((s.seaType==='FCL20'||s.seaType==='FCL40')&&s.containerQty?' × '+s.containerQty:'');
}

const IMP_STAGES = [

  {key:'booking',label:'จองเรือ',color:'#2563eb'},
  {key:'transit',label:'กำลังขนส่ง',color:'#4f46e5'},
  {key:'arrived',label:'ถึงท่าเรือ',color:'#d97706'},
  {key:'customs',label:'พิธีการศุลกากร',color:'#ea580c'},
  {key:'received',label:'รับเข้าคลัง',color:'#16a34a'}
];
const EXP_STAGES = [
  {key:'draft',label:'SO ตั้งต้น',color:'#64748b'},
  {key:'packing',label:'ผลิต / แพ็ค',color:'#7c3aed'},
  {key:'booking',label:'จองเรือ',color:'#2563eb'},
  {key:'shipped',label:'จัดส่งแล้ว',color:'#4f46e5'},
  {key:'arrived',label:'ถึงปลายทาง',color:'#16a34a'}

const PATHS = {
  boxes:'M3.5 9.5l8.5-4.5 8.5 4.5-8.5 4.5z M3.5 9.5v5l8.5 4.5 8.5-4.5v-5 M12 14v5',
  down:'M12 4v13 M6 11l6 6 6-6',up:'M12 20V7 M6 13l6-6 6 6',

function Ico({name,size=18,sw=1.7}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">

  </svg>;
}

const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmtDate(d){
  if(!d) return '—';
  const p=String(d).slice(0,10).split('-');
  if(p.length<3||!p[1]) return '—';
  return parseInt(p[2])+' '+MONTHS[parseInt(p[1])-1]+' '+(parseInt(p[0])+543-2500);
}
function fmtBaht(v){return '฿'+Math.round(v||0).toLocaleString('en-US');}
function fmtAmt(v,cur){
  const sym={CNY:'¥',USD:'$',THB:'฿',SGD:'S$'}[cur]||'';
  return sym+Math.round(v||0).toLocaleString('en-US');
}
function rateGuess(cur){return ({CNY:4.77,USD:33.3,SGD:25.4,THB:1})[cur]||1;}
// สีประจำสกุลเงิน — ใช้ที่แผง FX exposure ใน Dashboard เท่านั้น (ไม่ผูกกับ palette อื่นในไฟล์)
function curColor(cur){return ({CNY:'#c91253',USD:'#7c3aed',SGD:'#0ea5e9',THB:'#16a34a'})[cur]||'#94a3b8';}
// fetch ที่มี timeout จริง — เดิม fetch() ไม่มี timeout ในตัว ถ้าเครือข่ายไป Odoo ค้าง
// (ไม่ reject ไม่ resolve) หน้าจอจะค้าง "กำลังโหลด…" ไปเรื่อยๆ โดยไม่มี error ให้เห็น
function fetchTimeout(url,opts,ms){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),ms||12000);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(t));
}
function stageMeta(tab,key){const list=tab==='export'?EXP_STAGES:IMP_STAGES;return list.find(s=>s.key===key)||list[0];}
function typeMeta(t){
  return ({oversea:{label:'Oversea',bg:'#dbeafe',color:'#1d4ed8'},pk:{label:'Packaging',bg:'#ffedd5',color:'#c2410c'},fg:{label:'Finished',bg:'#ede9fe',color:'#6d28d9'}})[t]||{label:'Oversea',bg:'#dbeafe',color:'#1d4ed8'};
}
function normType(t){t=(t||'').toLowerCase();if(t==='pk'||t==='fg'||t==='oversea')return t;return 'oversea';}
function coBadgeSty(co){const kob=co==='KOB';return {display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:'6px',fontSize:'10.5px',fontWeight:700,background:kob?'#fce7f3':'#ede9fe',color:kob?'#c91253':'#6d28d9'};}
function billCatLabel(c){return ({freight:'ค่าขนส่ง',clearance:'พิธีการ',insurance:'ประกันภัย',duty:'อากร',vat:'VAT'})[c]||'อื่นๆ';}
// ป้ายชื่อฟิลด์ภาษาไทยสำหรับ audit log — เดิม auditLog เก็บแค่ชื่อฟิลด์ดิบ (เช่น "cur","freight")
// ไม่ friendly สำหรับ manager มาดู แปลเฉพาะฟิลด์ที่มีความหมายทางธุรกิจ ที่เหลือ fallback เป็นชื่อดิบ
const AUDIT_FIELD_LABELS={cur:'สกุลเงิน',amount:'มูลค่า',rate:'อัตราแลกเปลี่ยน',stage:'สถานะ',eta:'ETA',etd:'ETD',
  actualDate:'วันที่รับเข้าคลังจริง',freight:'ค่าขนส่ง',clearance:'ค่าพิธีการ',insurance:'ค่าประกันภัย',duty:'อากรขาเข้า',
  vat:'ภาษีมูลค่าเพิ่ม',bl:'เลข BL/AWB',bl_awb:'เลข BL/AWB',container:'ตู้คอนเทนเนอร์',vessel:'เรือ/เที่ยว',
  forwarder:'ตัวแทนขนส่ง',note:'หมายเหตุ',overReceipt:'รับเกิน',dest:'ปลายทาง',origin:'ต้นทาง',party:'คู่ค้า',
  courierCo:'บริษัทขนส่ง',containerQty:'จำนวนตู้',expectedCost:'ต้นทุนที่คาดการณ์ไว้'};
// เฉพาะฟิลด์ที่มีความหมายทางธุรกิจ — กรอง internal state ทิ้ง (ขึ้นต้น _ หรืออยู่ในลิสต์กันเอง)
const AUDIT_SKIP_FIELDS=new Set(['po_so','id','_ts','_board','_edited','_rateIsThb','_synthetic','_splitBase','type','company','mode','seaType','bills']);
function auditEntrySummary(e){
  if(e.action==='create')return 'สร้างรายการใหม่';
  if(e.action==='delete')return 'ลบรายการ';
  if(e.action==='delete_denied')return 'พยายามลบแต่รหัสผ่านผิด';
  if(e.action==='replace_all')return 'แทนที่ข้อมูลทั้งชุด';
  const meaningful=(e.fields||[]).filter(f=>!AUDIT_SKIP_FIELDS.has(f)&&!f.startsWith('_'));
  if(!meaningful.length)return 'แก้ไข (ไม่มีฟิลด์สำคัญเปลี่ยน)';
  const labels=meaningful.slice(0,5).map(f=>AUDIT_FIELD_LABELS[f]||f);
  return 'แก้ไข: '+labels.join(', ')+(meaningful.length>5?' และอีก '+(meaningful.length-5)+' ช่อง':'');
}
// สถานะดิบจาก Odoo — แสดงคู่กับสถานะที่ระบบตีความ (stage) เพื่อให้ตรวจสอบไขว้กันได้
function odooStateLabel(s){return ({draft:'ร่าง (draft)',sent:'ส่ง RFQ แล้ว',to_approve:'รออนุมัติ',purchase:'ยืนยันแล้ว (purchase)',done:'ล็อกแล้ว (done)',cancel:'ยกเลิก'})[s]||s||'—';}
function receiptStatusLabel(s){return ({pending:'ยังไม่รับของ',partial:'รับบางส่วน',full:'รับครบแล้ว'})[s]||s||'—';}
// สถานะย่อยจาก Odoo แบบสั้น สำหรับแสดงบนการ์ด — บอกว่า PO ยืนยันหรือยัง/รับของหรือยัง
// ช่วยแยกแยะ PO ที่อยู่คอลัมน์เดียวกันว่าจริงๆ คืบหน้าต่างกันแค่ไหน
function poStatusMini(s){
  const parts=[];
  const st={draft:'RFQ ร่าง',sent:'ส่ง PO แล้ว',to_approve:'รออนุมัติ',purchase:'PO ยืนยันแล้ว',done:'ปิด PO',cancel:'ยกเลิก'}[s._odooState];
  if(st)parts.push(st);
  const rc={partial:'รับของบางส่วน',full:'รับของครบ'}[s._receiptStatus];
  if(rc)parts.push(rc);
  return parts.join(' · ');
}
function poStatusColor(s){
  if(s._receiptStatus==='full')return '#16a34a';
  if(s._receiptStatus==='partial')return '#d97706';
  if(s._odooState==='purchase'||s._odooState==='done')return '#2563eb';
  if(s._odooState==='draft'||s._odooState==='sent')return '#94a3b8';
  return '#94a3b8';
}
function billCatSty(c){const m=({freight:{bg:'#dbeafe',fg:'#1d4ed8'},clearance:{bg:'#fae8ff',fg:'#a21caf'},insurance:{bg:'#ccfbf1',fg:'#0f766e'},duty:{bg:'#ffedd5',fg:'#c2410c'},vat:{bg:'#dcfce7',fg:'#15803d'}})[c]||{bg:'#f3edf0',fg:'#7a818d'};return {display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:m.bg,color:m.fg};}
// ต้นทุนนำเข้ารวมของ shipment (ไม่รวมมูลค่าสินค้า)
function costSum(s){return (s.freight||0)+(s.clearance||0)+(s.insurance||0)+(s.duty||0)+(s.vat||0);}
// ต้นทุนรวมแปลงเป็นบาท (มูลค่าสินค้า + ต้นทุนนำเข้า) — ใช้ทั้งตารางต้นทุนและ Dashboard
function totalCostThb(s){return (s.amount||0)*(s.rate||0)+costSum(s);}
// สรุปผล Transit Time เทียบ KPI สำหรับ import + sea freight เท่านั้น (ตรงกับที่มีมาตรฐานอ้างอิง)
// onTime/late นับเฉพาะรายการที่มี ETD + วันที่รับจริง + มีมาตรฐานให้เทียบ (findPortKpi เจอ)
function transitStats(list){
  let onTime=0,late=0,noData=0;
  list.forEach(s=>{
    const ti=transitInfo(s);
    if(!ti||!ti.kpi){noData++;return;}
    if(ti.days<=ti.kpi.days)onTime++;else late++;
  });
  return {onTime,late,noData,measured:onTime+late};
}
// ปีจากวันที่ ETD (ถ้าไม่มีใช้ ETA) — ใช้จัดกลุ่มสรุปค่าใช้จ่ายรายปี/ไตรมาส
function yearOf(s){
  const d=new Date(s.etd||s.eta||s.orderDate||'');
  return isNaN(d)?null:d.getFullYear();
}
// ไตรมาสแบบ 3 ช่วง/ปี (Q1=ม.ค.-เม.ย., Q2=พ.ค.-ส.ค., Q3=ก.ย.-ธ.ค.) ตามที่กำหนด
function quarterOf(s){
  const d=new Date(s.etd||s.eta||s.orderDate||'');
  if(isNaN(d))return null;
  const y=d.getFullYear(),m=d.getMonth()+1,q=m<=4?1:m<=8?2:3;
  return {y,q,key:y+'-Q'+q,label:'Q'+q+'/'+(y+543-2500)};
}
function typeBadgeSty(t){const m=typeMeta(t);return {display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:'6px',fontSize:'10.5px',fontWeight:600,background:m.bg,color:m.color};}
function stageBadgeSty(tab,key){const m=stageMeta(tab,key);return {display:'inline-flex',alignItems:'center',gap:'5px',padding:'3px 9px',borderRadius:'99px',fontSize:'11px',fontWeight:600,background:m.color+'1a',color:m.color,whiteSpace:'nowrap'};}
function stageDotSty(tab,key){return {width:'6px',height:'6px',borderRadius:'50%',background:stageMeta(tab,key).color,flexShrink:0};}

const INP={width:'100%',height:'38px',padding:'0 11px',border:'1.5px solid #e8dde4',borderRadius:'9px',fontFamily:'inherit',fontSize:'13px',color:'#14181f',outline:'none',background:'#fff'};
const SEL={...INP,cursor:'pointer',padding:'0 9px'};

function Field({label,children}){return <div><label style={{display:'block',fontSize:'11px',fontWeight:600,color:'#7a818d',marginBottom:'5px'}}>{label}</label>{children}</div>;}
function FInput({label,...p}){return <Field label={label}><input style={INP} {...p}/></Field>;}
function FSelect({label,value,onChange,children}){return <Field label={label}><select style={SEL} value={value} onChange={onChange}>{children}</select></Field>;}
// กลุ่มช่อง Ship Mode ที่ใช้ร่วมกันทั้งฟอร์มสร้าง/แก้ไข — เปลี่ยน Ship Mode แล้วโชว์ช่องย่อยตามประเภท
// v = {mode,seaType,containerQty,courierCo} ปัจจุบัน, set(key,val) = setter ของฟอร์มนั้น
function ShipModeFields({v,set}){
  const isFcl=v.seaType==='FCL20'||v.seaType==='FCL40';
  return <>
    <FSelect label="Ship Mode (รูปแบบขนส่ง)" value={v.mode||'sea'} onChange={e=>set('mode',e.target.value)}>
      {SHIP_MODES.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
    </FSelect>
    {v.mode==='sea'&&<FSelect label="Sea Type" value={v.seaType||''} onChange={e=>set('seaType',e.target.value)}>
      <option value="">— เลือกประเภทตู้ —</option>
      {SEA_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
    </FSelect>}
    {v.mode==='sea'&&isFcl&&<FInput label="จำนวนตู้คอนเทนเนอร์" type="number" min="1" placeholder="เช่น 1" value={v.containerQty||''} onChange={e=>set('containerQty',e.target.value)}/>}
    {v.mode==='courier'&&<FSelect label="บริษัทขนส่งพัสดุ (Courier)" value={v.courierCo||''} onChange={e=>set('courierCo',e.target.value)}>
      <option value="">— เลือก Courier —</option>
      {COURIERS.map(c=><option key={c} value={c}>{c}</option>)}
    </FSelect>}
  </>;

class App extends Component {
  constructor(props){
    super(props);
    const w=typeof window!=='undefined'?window.innerWidth:1280;
    this.state={tab:'import',view:'kanban',co:'',type:'all',query:'',detailId:null,syncing:false,shipments:null,dataSource:'loading',lastSync:'—',creating:false,saving:false,toast:null,form:defaultForm('import'),editing:false,editForm:null,vendors:null,expenseBusy:false,costSrc:'',savingEdit:false,isNarrow:w<880,billPicker:false,billList:null,billQuery:'',billLoading:false,billError:false,selBills:{},alertsOpen:false,dragOverKey:null,deleteDialog:null,poLines:null,poLinesLoading:false,poLinesError:'',integrityReport:null,integrityLoading:false,verifyFiles:[],verifyLoading:false,verifyResult:null,verifyError:null,auditLog:null,auditLoading:false,vendorScorecard:null,vendorScorecardLoading:false,glReconcile:null,glReconcileLoading:false};
    this._plan=null; this._overrides={}; this._tt=null; this._fx=null; this._poLinesCache={};
  }
  componentDidMount(){
    window.addEventListener('resize',this._onResize=()=>{const n=window.innerWidth<880;if(n!==this.state.isNarrow)this.setState({isNarrow:n});});
    this.loadData();
    // อัปเดตข้อมูลจาก Odoo อัตโนมัติเป็นระยะ — ถ้าตอนนี้อยู่ในโหมด fallback (Odoo เพิ่งหลุด)
    // จะได้กลับมาสถานะ live เองทันทีที่เชื่อมต่อได้ ไม่ต้องรอผู้ใช้กด Sync เอง
    // ข้ามไปถ้ากำลังแก้ไข/เปิด picker อยู่ กันข้อมูลกระตุกระหว่างพิมพ์
    this._autoRefresh=setInterval(()=>{
      if(this.state.syncing||this.state.editing||this.state.creating||this.state.billPicker)return;
      this.loadData();
    },180000); // ทุก 3 นาที
    this.loadIntegrityReport(false);
    this.loadAuditLog();
    this.loadVendorScorecard();
    this.loadGlReconcile();
  }
  // เทียบยอด PO (invoiced ตาม Odoo แล้ว) กับยอดบิลจริงที่ผูกอยู่ — ดู comment เต็มที่ endpoint ฝั่ง server
  async loadGlReconcile(){
    this.setState({glReconcileLoading:true});
    try{
      const r=await fetchTimeout('/api/gl-reconciliation',{headers:{Accept:'application/json'}},15000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      this.setState({glReconcile:j,glReconcileLoading:false});
    }catch(e){this.setState({glReconcileLoading:false});}
  }
  // อัตราส่งตรงเวลา+ความล่าช้าเฉลี่ยต่อผู้ขาย จาก stock_picking (scheduled_date เทียบ date_done จริง) —
  // cache ฝั่ง server 1 ชม.ตาม cachedQuery ปกติ ไม่ต้อง force ทุกครั้งที่เปิดหน้า
  async loadVendorScorecard(){
    this.setState({vendorScorecardLoading:true});
    try{
      const r=await fetchTimeout('/api/vendor-scorecard',{headers:{Accept:'application/json'}},15000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      this.setState({vendorScorecard:j.rows,vendorScorecardLoading:false});
    }catch(e){this.setState({vendorScorecardLoading:false});}
  }
  componentWillUnmount(){window.removeEventListener('resize',this._onResize);clearInterval(this._autoRefresh);}
  // ประวัติการแก้ไขล่าสุด (สำหรับ manager ดูภาพรวม) — endpoint เดิม /api/tracking/history รองรับอยู่แล้ว
  // (ไม่ใส่ po = คืนทุกรายการล่าสุด) แค่ยังไม่เคยมี UI ฝั่งนี้เรียกใช้แบบภาพรวมมาก่อน
  async loadAuditLog(){
    this.setState({auditLoading:true});
    try{
      const r=await fetchTimeout('/api/tracking/history?limit=40',{headers:{Accept:'application/json'}},12000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      this.setState({auditLog:j.entries,auditLoading:false});
    }catch(e){this.setState({auditLoading:false});}
  }
  // เปิด PO/SO ที่คลิกจาก audit log — หาใน shipment ปัจจุบันด้วย poNo แล้วสลับ tab+เปิด detail
  jumpToAuditEntry(poSo){
    const found=this.allShipments().find(s=>s.poNo===poSo);
    if(!found){this.showToast('ไม่พบรายการนี้แล้ว (อาจถูกลบหรือรวมไปแล้ว)','info');return;}
    this.setState({tab:found._board,detailId:found.id,view:'kanban'});
  }
  // ผลตรวจสอบข้อมูลอัตโนมัติจาก server (รอบ 24 ชม. + เช็คตอน server เพิ่งเปิด) — force=true = สั่งตรวจใหม่ทันที
  async loadIntegrityReport(force){
    this.setState({integrityLoading:true});
    try{
      const r=await fetchTimeout('/api/integrity-check'+(force?'?force=1':''),{headers:{Accept:'application/json'}},force?20000:12000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      this.setState({integrityReport:j,integrityLoading:false});
    }catch(e){this.setState({integrityLoading:false});}
  }
  // เปิดรายละเอียด PO ใบใหม่ (detailId เปลี่ยน) → โหลดรายการสินค้าของ PO นั้นอัตโนมัติ
  // อยู่จุดเดียวตรงนี้ ไม่ต้องแก้ทุกที่ที่ setState({detailId:...}) กระจายอยู่หลายจุด
  componentDidUpdate(prevProps,prevState){
    if(this.state.detailId&&this.state.detailId!==prevState.detailId){
      const sel=this.allShipments().find(s=>s.id===this.state.detailId);
      if(sel)this.loadPoLines(sel);
    }
  }
  // PO ที่แยกเป็น shipment ย่อย (_synthetic) ไม่มี PO จริงคู่กัน — โชว์รายการสินค้าของ PO ต้นฉบับแทน
  async loadPoLines(sel){
    const board=sel._board,poForLines=sel._splitBase||sel.poNo;
    const cacheKey=board+':'+poForLines;
    // TTL 5 นาที ให้ตรงกับ PO_LINE_CACHE_TTL ฝั่ง server — เดิม cache ฝั่ง client ไม่มีวันหมดอายุเลยในทาบเดียว
    // เปิด PO เดิมซ้ำตอนหลังราคาสินค้าอาจเปลี่ยนใน Odoo แล้ว แต่ยังเห็นของเก่าไม่มีอะไรบอกว่าเก่า
    const cached=this._poLinesCache[cacheKey];
    if(cached&&(Date.now()-cached.ts)<300000){this.setState({poLines:cached.rows,poLinesLoading:false,poLinesError:''});return;}
    this.setState({poLines:null,poLinesLoading:true,poLinesError:''});
    try{
      // เผื่อเวลาให้พอกับ path ตรง→MCP bridge เดียวกับ loadData() (ตรงหลุด ~13 วิ + MCP ต่ออีกหลายวิ)
      // เดิม 12 วิ พอกันกับตอน loadData ก่อนแก้ ทำให้ตอน RDS หลุดจะขึ้น "โหลดไม่สำเร็จ" หลอกๆ ทั้งที่ server หาเจอ
      const r=await fetchTimeout('/api/po-lines?po='+encodeURIComponent(poForLines)+'&board='+board,{headers:{Accept:'application/json'}},20000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      // จำกัดขนาด cache กันโตไม่มีเพดานถ้าเปิดดู PO ไปเรื่อยๆ ในทาบเดียวนานๆ — ตัดตัวเก่าสุดออกเมื่อเกิน
      const keys=Object.keys(this._poLinesCache);
      if(keys.length>=200)delete this._poLinesCache[keys[0]];
      this._poLinesCache[cacheKey]={rows:j.rows||[],ts:Date.now()};
      // ถ้าผู้ใช้เปิดรายละเอียดใบอื่นไปแล้วระหว่างรอ ไม่ต้อง setState ทับของใบใหม่
      if(this.state.detailId===sel.id)this.setState({poLines:j.rows||[],poLinesLoading:false});
    }catch(e){
      if(this.state.detailId===sel.id)this.setState({poLines:null,poLinesLoading:false,poLinesError:e.message||'โหลดไม่สำเร็จ'});
    }
  }
  nowTime(){const d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+' น.';}

  async loadData(){
    this.setState({dataSource:'loading'});
    // force sync (ปุ่ม Sync Odoo) อาจต้องรอทั้ง direct pg timeout (~13 วิ) แล้วต่อด้วย MCP bridge
    // (อีกหลายวิ) ก่อนจะรู้ผล — ให้เวลามากกว่าโหลดปกติ กัน timeout ฝั่ง client ตัดก่อนได้คำตอบจริง
    // แล้วดีดไปโชว์ fallback ข้อมูลเก่าทั้งที่ server หาข้อมูลสดเจอจริงๆ (แค่ช้ากว่าที่ client รอ)
    const grab=async u=>{const r=await fetchTimeout(u,{headers:{Accept:'application/json'}},this._forceSync?35000:15000);if(!r.ok)throw 0;return r.json();};
    // อัตราแลกเปลี่ยนล่าสุดจาก Odoo (ใช้ตอนสร้างรายการใหม่ — fallback เป็นค่า default ถ้าโหลดไม่ได้)
    if(!this._fx){try{const fx=await grab('/api/fx-rates');if(fx&&fx.ok){const m={};(fx.rows||[]).forEach(r=>{m[r.currency]=r.thb_per_unit;});this._fx=m;}}catch(e){}}
    try{const p=await grab('/api/import-plan');this._plan=(p&&p.ok&&p.rows)?p.rows:null;}catch(e){this._plan=null;}
    let overrides={},trackingRows=null;
    try{const j=await grab('/api/tracking');if(j&&j.ok&&Array.isArray(j.rows)){trackingRows=j.rows;j.rows.forEach(r=>{const k=r.po_so||r.poNo;if(k)overrides[k]=r;});}}catch(e){}
    this._overrides=overrides;
    // ดึง import-pos/export-sos — server เสิร์ฟ snapshot ล่าสุดให้ทันทีถ้า Odoo หลุด
    // (มี flag stale + as_of บอกว่าเป็นข้อมูลสดหรือชุดที่เก็บไว้ และเก็บไว้เมื่อไหร่)
    const force=this._forceSync?'?force=1':'';
    async function fetchLive(){
      const [imp,exp]=await Promise.all([grab('/api/import-pos'+force).catch(()=>null),grab('/api/export-sos'+force).catch(()=>null)]);
      const rows=[];let stale=false,asOf=null;
      if(imp&&imp.rows){imp.rows.forEach(r=>rows.push(this.mapPo(r,'import')));if(imp.stale)stale=true;if(imp.as_of)asOf=imp.as_of;}
      if(exp&&exp.rows){exp.rows.forEach(r=>rows.push(this.mapPo(r,'export')));if(exp.stale)stale=true;}
      return rows.length?{rows,stale,asOf}:null;
    }
    let res=null;
    try{ res=await fetchLive.call(this); }catch(e){}
    // ถ้าไม่ได้อะไรเลย ลองซ้ำ 1 ครั้ง (network blip)
    if(!res){ await new Promise(r=>setTimeout(r,1500)); try{ res=await fetchLive.call(this); }catch(e){} }
    let base=res?res.rows:null, isLive=res?!res.stale:false;
    this._asOf=res?res.asOf:null;
    // สำรองสุดท้าย: ข้อมูลที่ผู้ใช้เคยแก้เอง (tracking) — ใช้เมื่อไม่มีทั้ง live และ snapshot
    if(!base&&trackingRows&&trackingRows.length)base=trackingRows.map(r=>this.mapTracking(r));
    if(!base){
      if(Array.isArray(this.state.shipments)&&this.state.shipments.length){
        this.showToast('ซิงค์ไม่สำเร็จ — แสดงข้อมูลชุดล่าสุดที่มีอยู่','error');
      } else {
        this.setState({shipments:null,dataSource:'sample'});
      }
      return;
    }
    if(this._plan)base=this.applyPlan(base,this._plan);
    base=this.applyOverrides(base);
    this.setState({shipments:base,dataSource:isLive?'live':'fallback',lastSync:this.nowTime()});
  }

  strip(k){return(k||'').replace(/\s*\(\d+\)\s*$/,'').trim();}
  applyOverrides(rows){
    const ov=this._overrides;if(!ov||!Object.keys(ov).length)return rows;
    // idx เป็น fallback แบบ fuzzy-match สำหรับ override/plan เก่าที่คีย์มี " (2)" ต่อท้ายเพราะข้อมูลต้นทางเดิมเป็นแบบนั้น
    // (ดู strip()) — ต้องข้าม override ที่เป็น _synthetic (shipment ที่แยกเอง) ไม่งั้น PO จริงที่ยังไม่มี
    // override ของตัวเองจะดันไปจับคู่กับ override ของ "PO (2)" (ตัวแยก) แทน ทำให้มูลค่า/สกุลเงินของ PO จริงเพี้ยน
    const idx={};Object.keys(ov).forEach(k=>{if(ov[k]._synthetic)return;const n=this.strip(k);if(!idx[n])idx[n]=ov[k];});
    const merged=rows.map(s=>{const o=ov[s.poNo]||idx[this.strip(s.poNo)];return o?this.applyOne(s,o):s;});
    // shipment ย่อยที่แยกออกจาก PO เดิม (ไม่มี PO จริงคู่กันใน Odoo) — ไม่ merge ทับ ต้องเพิ่มเป็นรายการใหม่ต่างหาก
    const extra=Object.keys(ov).filter(k=>ov[k]._synthetic&&!rows.some(s=>s.poNo===k)).map(k=>this.mapSynthetic(ov[k]));
    return merged.concat(extra);
  }
  // สร้าง shipment object เต็มจาก override ที่เป็นรายการสังเคราะห์ (แยก shipment/สร้างใหม่)

  mapSynthetic(o){

    const o={po_so:s.poNo,_board:s._board,_edited:true,_rateIsThb:true,_ts:Date.now(),type:s._board,company:s.company,party:s.party,cur:s.cur,amount:s.amount,rate:s.rate,stage:newStage,mode:s.mode||'sea',seaType:s.seaType||'',containerQty:s.containerQty||0,courierCo:s.courierCo||'',origin:s.origin||'',dest:s.dest||'',bl:s.bl||'',bl_awb:s.bl||'',container:s.container||'',vessel:s.vessel||'',forwarder:s.forwarder||'',etd:s.etd||'',eta:s.eta||'',actualDate:s.actualDate||(terminal?new Date().toISOString().slice(0,10):''),freight:s.freight||0,clearance:s.clearance||0,insurance:s.insurance||0,duty:s.duty||0,vat:s.vat||0,bills:Array.isArray(s.bills)?s.bills:[],overReceipt:!!s.overReceipt,note:s.note||'',_synthetic:!!s._synthetic,_splitBase:s._splitBase||''};
    const ov={...this._overrides};ov[s.poNo]=o;this._overrides=ov;
    const rows=this.allShipments().map(x=>x.poNo===s.poNo?this.applyOne(x,o):x);

      this.showToast(res.ok?('ย้าย '+s.poNo+' → '+stageMeta(s._board,newStage).label):('บันทึกไม่สำเร็จ: HTTP '+res.status),res.ok?'success':'error');
    }catch(e){this.showToast('บันทึกไม่สำเร็จ: '+e.message,'error');}
  }
  // ── แยก PO ที่ถูกส่งเป็นหลายรอบออกเป็น shipment ย่อยบน Kanban ──
  // ตั้งชื่อ PO ต่อท้ายด้วย " (n)" (convention เดียวกับที่ strip()/applyPlan ใช้จับคู่ PO เดิมอยู่แล้ว)
  // ค่ามูลค่า/ต้นทุนเริ่มที่ 0 เสมอ — ต้อง กรอกเองว่าล็อตนี้เป็นสัดส่วนเท่าไหร่ ไม่งั้นยอดจะนับซ้ำกับ PO ต้นฉบับ
  splitShipment(){
    const s=this.allShipments().find(x=>x.id===this.state.detailId);if(!s)return;
    const base=this.strip(s._splitBase||s.poNo);
    const siblings=this.allShipments().filter(x=>this.strip(x._splitBase||x.poNo)===base);
    const n=siblings.length+1;
    const poNo=base+' ('+n+')';
    const id='t_'+poNo;
    const o={po_so:poNo,id,_board:s._board,_edited:true,_synthetic:true,_rateIsThb:true,_splitBase:base,_ts:Date.now(),type:s._board,company:s.company,party:s.party,cur:s.cur,amount:0,rate:s.rate,stage:s._board==='export'?'draft':'po',mode:s.mode||'sea',seaType:s.seaType||'',containerQty:0,courierCo:s.courierCo||'',origin:s.origin||'',dest:s.dest||'',bl:'',bl_awb:'',container:'',vessel:'',forwarder:'',etd:'',eta:s.eta||'',actualDate:'',freight:0,clearance:0,insurance:0,duty:0,vat:0,bills:[],overReceipt:false,note:'แยกจาก PO '+base+' — ชุดที่ '+n};
    const ov={...this._overrides};ov[poNo]=o;this._overrides=ov;
    const ns=this.mapSynthetic(o);
    this.setState({shipments:[ns].concat(this.allShipments()),detailId:ns.id,tab:s._board,view:'kanban'},()=>this.startEdit());
    // เดิม fire-and-forget (.catch(()=>{})) — บันทึกไม่ผ่านก็ไม่มีใครรู้ เพราะ toast "สร้างสำเร็จ" ขึ้นไปแล้ว
    // ทั้งที่ยังไม่รู้ผลจริง ตอนนี้รอผลจาก server ก่อนค่อยบอกผู้ใช้ ให้สอดคล้องกับจุดอื่นที่บันทึกข้อมูล (saveEdit ฯลฯ)
    fetch('/api/tracking/upsert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)})
      .then(res=>{this.showToast(res.ok?('สร้าง shipment ย่อย '+poNo+' แล้ว — กรอกมูลค่า/ค่าใช้จ่ายของล็อตนี้เอง'):('บันทึกไม่สำเร็จ: HTTP '+res.status),res.ok?'success':'error');})
      .catch(e=>this.showToast('บันทึกไม่สำเร็จ: '+e.message,'error'));
  }
  // ── ลบ shipment ที่แยกเอง — เฉพาะรายการ _synthetic เท่านั้น (PO จริงจาก Odoo ลบไม่ได้) ──
  // server จะปฏิเสธเสมอถ้ายังไม่ได้ตั้ง DELETE_PASSWORD ใน .env — ต้องให้เจ้าของระบบเปิดใช้งานก่อน
  openDeleteDialog(poNo){this.setState({deleteDialog:{poNo,password:'',busy:false,error:''}});}

  // ── เปิดรายการบิลขนส่ง/ศุลกากร ให้ผู้ใช้เลือกจับคู่ ──
  async openBillPicker(){
    const f=this.state.editForm;if(!f)return;
    // preselect บิลที่เคยจับคู่ไว้
    const sel={};(f.bills||[]).forEach(b=>{sel[b.id]=b;});
    this.setState({billPicker:true,billQuery:'',selBills:sel,billError:false});
    // cache แยกตามบริษัท — เดิมเช็คแค่ "มีลิสต์อยู่แล้วหรือยัง" ทำให้เปิด BTV ต่อจาก KOB
    // เห็นบิลของ KOB ค้างอยู่ (ผิดบริษัท)
    if(this.state.billList&&this.state.billList.length&&this._billListCompany===f.company){return;}
    this.setState({billLoading:true});
    try{
      const r=await fetchTimeout('/api/logistics-bills?company='+encodeURIComponent(f.company)+'&months=12',{headers:{Accept:'application/json'}},15000);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const j=await r.json();
      this._billListCompany=f.company;
      this.setState({billList:(j&&j.bills)||[],billLoading:false});
    }catch(e){
      this.setState({billList:[],billLoading:false,billError:true});
      this.showToast(e.name==='AbortError'?'เชื่อมต่อ Odoo ไม่ทันเวลา — ลองใหม่อีกครั้ง':'โหลดรายการบิลไม่สำเร็จ','error');
    }
  }
  closeBillPicker(){this.setState({billPicker:false});}
  toggleBill(b){this.setState(s=>{const sel={...s.selBills};if(sel[b.id])delete sel[b.id];else sel[b.id]=b;return {selBills:sel};});}
  // ใช้บิลที่เลือก: รวม freight/duty/vat เติมลงช่อง + จำการจับคู่ไว้
  applySelectedBills(){
    const sel=Object.values(this.state.selBills||{});
    let freight=0,clearance=0,insurance=0,duty=0,vat=0;
    sel.forEach(b=>{freight+=b.freight||0;clearance+=b.clearance||0;insurance+=b.insurance||0;duty+=b.duty||0;vat+=b.vat||0;});
    const meta=sel.map(b=>({id:b.id,kind:b.kind||'bill',bill:b.bill,partner:b.partner,amount:b.amount,category:b.category,freight:b.freight||0,clearance:b.clearance||0,insurance:b.insurance||0,duty:b.duty||0,vat:b.vat||0}));
    this.setState(s=>({
      editForm:{...s.editForm,freight:Math.round(freight),clearance:Math.round(clearance),insurance:Math.round(insurance),duty:Math.round(duty),vat:Math.round(vat),bills:meta},
      billPicker:false,
      costSrc:sel.length?('✓ จับคู่ '+sel.length+' รายการจาก Odoo'):''
    }));
    const total=freight+clearance+insurance+duty+vat;
    this.showToast(sel.length?('ใช้ '+sel.length+' รายการ รวม ฿'+Math.round(total).toLocaleString()):'ไม่ได้เลือกบิล',sel.length?'success':'info');
  }

    // ของ PO จริง มูลค่ามาจาก Odoo เสมอ ไม่ให้ฟอร์มนี้ทับ (ไม่มีช่องแก้ในฟอร์มอยู่แล้ว ค่าจะเท่าเดิม)
    const o={po_so:f.poNo,_board:f.board,_edited:true,_rateIsThb:true,_synthetic:!!f._synthetic,_splitBase:f._splitBase||'',_ts:Date.now(),type:f.board,company:f.company,party:f.party,cur:f.cur,amount:num(f.amount)||0,rate:f.rate,stage:f.stage||'',mode:f.mode||'sea',seaType:f.seaType||'',containerQty:num(f.containerQty),courierCo:f.courierCo||'',origin:f.origin||'',dest:f.dest||'',bl:f.bl||'',bl_awb:f.bl||'',container:f.container||'',vessel:f.vessel||'',forwarder:f.forwarder||'',etd:f.etd||'',eta:f.eta||'',actualDate:f.actualDate||'',freight:num(f.freight),clearance:num(f.clearance),insurance:num(f.insurance),duty:num(f.duty),vat:num(f.vat),expectedCost:num(f.expectedCost),bills:Array.isArray(f.bills)?f.bills:[],overReceipt:!!f.overReceipt,note:f.note||''};
    const ov={...this._overrides};ov[f.poNo]=o;this._overrides=ov;

  // กด Sync = ล้าง cache ฝั่ง server ก่อน เพื่อให้ได้ข้อมูลสดจริง (ไม่ติด cache 5 นาที)
  // กด Sync = บังคับ probe Odoo จริง (ข้าม circuit breaker + ล้าง cache ทั้งฝั่ง server)
  sync(){if(this.state.syncing)return;this.setState({syncing:true});this._forceSync=true;fetch('/api/cache/clear').catch(()=>{}).then(()=>this.loadData()).then(()=>{this._forceSync=false;this.setState({syncing:false});}).catch(()=>{this._forceSync=false;this.setState({syncing:false});});}
  // อัตราแลกเปลี่ยน: ใช้ค่าจริงจาก Odoo ก่อน ถ้าไม่มีจึงใช้ค่า default
  fxRate(cur){const v=this._fx&&this._fx[cur];return (v&&v>0)?v:rateGuess(cur);}

  // แปลง shipment list → แถว Excel — ใช้ร่วมกันทั้งปุ่ม export ต่อบอร์ด (exportExcel) และ
  // รายงานสรุปสำหรับบัญชี (exportAccountingReport) กันสองที่คำนวณคอลัมน์ไม่ตรงกัน
  buildExcelRows(list,tab){
    return list.map(s=>{
      const ti=transitInfo(s);
      return {
      'PO/SO':s.poNo,'บริษัท':s.company,'ผู้ขาย/ลูกค้า':s.party,
      'ประเภท':typeMeta(s.type).label,'สถานะ':stageMeta(tab,s.stage).label,
      'Ship Mode':shipModeLabel(s),'สกุลเงิน':s.cur,'มูลค่าสินค้า':s.amount,
      'มูลค่าสินค้า (฿)':Math.round(s.amount*s.rate),'ค่าขนส่ง (฿)':s.freight||0,
      'ค่าเดินพิธีการ (฿)':s.clearance||0,'ค่าประกันภัย (฿)':s.insurance||0,
      'อากร (฿)':s.duty||0,'VAT (฿)':s.vat||0,
      'ต้นทุนรวม (฿)':Math.round(s.amount*s.rate+costSum(s)),

      'ตู้':s.container,'เรือ/เที่ยว':s.vessel,'Forwarder':s.forwarder,
      'ETD':s.etd,'ETA (ประมาณ)':s.eta,'วันที่รับจริง/ถึงจริง':s.actualDate||'',
      'Transit จริง (วัน)':ti?ti.days:'','KPI มาตรฐาน (วัน)':ti&&ti.kpi?ti.kpi.days:'',
      'ผลเทียบ KPI':ti&&ti.kpi?(ti.days-ti.kpi.days<=0?'ตรง/เร็วกว่า':('ล่าช้า '+(ti.days-ti.kpi.days)+' วัน')):'',
    };});
  }
  // ── Export Excel: รายการตาม filter ปัจจุบัน + สรุปต้นทุน ──
  exportExcel(tab){
    if(!window.XLSX){this.showToast('ไม่พบไลบรารี Excel (vendor/xlsx.full.min.js)','error');return;}
    const list=this.filtered(tab);
    if(!list.length){this.showToast('ไม่มีรายการให้ export','info');return;}
    const rows=this.buildExcelRows(list,tab);
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=Object.keys(rows[0]).map(k=>({wch:Math.max(k.length+2,12)}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,tab==='export'?'Export':'Import');
    const today=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,'logistics-'+tab+'-'+today+'.xlsx');
    this.showToast('ดาวน์โหลด Excel แล้ว ('+list.length+' รายการ)','success');
  }
  // ── รายงานสรุปต้นทุนสำหรับบัญชี: รวม Import+Export ทุกสถานะ (ไม่ยึด filter หน้าจอ) + sheet สรุปรายไตรมาส ──
  // ต่างจาก exportExcel ปกติ (ต่อบอร์ด, ตาม filter ที่เลือกอยู่) — อันนี้ทำไว้ให้ใช้กระทบยอดกับบัญชีโดยเฉพาะ
  // จึงต้องครบทุกรายการเสมอ ไม่ขึ้นกับว่าผู้ใช้กรองหน้าจออะไรค้างไว้ตอนกด
  exportAccountingReport(qRows){
    if(!window.XLSX){this.showToast('ไม่พบไลบรารี Excel (vendor/xlsx.full.min.js)','error');return;}
    const impRows=this.buildExcelRows(this.allShipments().filter(s=>s._board==='import'),'import');
    const expRows=this.buildExcelRows(this.allShipments().filter(s=>s._board==='export'),'export');
    const qSummary=qRows.map(r=>({
      'ไตรมาส':r.label,
      'Import ต้นทุนรวม (฿)':Math.round(r.imp),'Import จำนวนรายการ':r.impN,'Import เฉลี่ยต่อออเดอร์ (฿)':Math.round(r.impAvg),
      'Export ต้นทุนรวม (฿)':Math.round(r.exp),'Export จำนวนรายการ':r.expN,'Export เฉลี่ยต่อออเดอร์ (฿)':Math.round(r.expAvg),
    }));
    const wb=XLSX.utils.book_new();
    if(qSummary.length){
      const wsQ=XLSX.utils.json_to_sheet(qSummary);
      wsQ['!cols']=Object.keys(qSummary[0]).map(k=>({wch:Math.max(k.length+2,14)}));
      XLSX.utils.book_append_sheet(wb,wsQ,'สรุปรายไตรมาส');
    }
    if(impRows.length){const ws=XLSX.utils.json_to_sheet(impRows);ws['!cols']=Object.keys(impRows[0]).map(k=>({wch:Math.max(k.length+2,12)}));XLSX.utils.book_append_sheet(wb,ws,'Import รายละเอียด');}
    if(expRows.length){const ws=XLSX.utils.json_to_sheet(expRows);ws['!cols']=Object.keys(expRows[0]).map(k=>({wch:Math.max(k.length+2,12)}));XLSX.utils.book_append_sheet(wb,ws,'Export รายละเอียด');}
    const today=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,'logistics-accounting-report-'+today+'.xlsx');
    this.showToast('ดาวน์โหลดรายงานสรุปแล้ว ('+(impRows.length+expRows.length)+' รายการ)','success');
  }

  // ── AI ตรวจเอกสาร (layer 4): อัปโหลดเอกสาร shipment → เรียก /api/verify-shipment ──
  onVerifyFilesAdd(fileList){
    const incoming=Array.from(fileList||[]);
    if(!incoming.length)return;
    this.setState(s=>({verifyFiles:[...s.verifyFiles,...incoming],verifyResult:null,verifyError:null}));
  }
  removeVerifyFile(idx){
    this.setState(s=>({verifyFiles:s.verifyFiles.filter((_,i)=>i!==idx)}));
  }
  async submitVerify(){
    const {verifyFiles}=this.state;
    if(!verifyFiles.length){this.showToast('กรุณาเลือกไฟล์ก่อน','info');return;}
    this.setState({verifyLoading:true,verifyResult:null,verifyError:null});
    const fd=new FormData();
    fd.append('mode','import');
    verifyFiles.forEach(f=>fd.append('files',f,f.name));
    try{
      const r=await fetchTimeout('/api/verify-shipment',{method:'POST',body:fd},240000);
      const j=await r.json();
      if(!r.ok||!j.ok)throw new Error(j.error||('HTTP '+r.status));
      this.setState({verifyResult:j,verifyLoading:false});
    }catch(e){
      this.setState({verifyLoading:false,verifyError:e.name==='AbortError'?'หมดเวลารอ (เกิน 4 นาที) — ลองใหม่หรือลดจำนวนไฟล์':e.message});
    }
  }
  exportVerifyExcel(){
    if(!window.XLSX){this.showToast('ไม่พบไลบรารี Excel (vendor/xlsx.full.min.js)','error');return;}
    const j=this.state.verifyResult;if(!j)return;
    const rows=[
      ...j.sections.correct.map(t=>({สถานะ:'✅ ถูกต้อง',รายการ:t})),
      ...j.sections.review.map(t=>({สถานะ:'🟡 ควรตรวจสอบ',รายการ:t})),
      ...j.sections.errors.map(t=>({สถานะ:'❌ ต้องแก้ไข',รายการ:t})),
    ];
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[{wch:14},{wch:90}];
    XLSX.utils.book_append_sheet(wb,ws,'ตรวจเอกสาร');
    if(j.taxCheck){
      const wsTax=XLSX.utils.json_to_sheet([j.taxCheck]);
      XLSX.utils.book_append_sheet(wb,wsTax,'ภาษีนำเข้า');
    }
    const wsSum=XLSX.utils.json_to_sheet([{สรุป:j.summary}]);
    wsSum['!cols']=[{wch:100}];
    XLSX.utils.book_append_sheet(wb,wsSum,'สรุป');
    XLSX.writeFile(wb,'verify-shipment-'+new Date().toISOString().slice(0,10)+'.xlsx');
    this.showToast('ดาวน์โหลด Excel แล้ว','success');
  }

  // ── รายการต้องติดตาม: ETA เลยกำหนด หรือใกล้ถึงใน 3 วัน ──
  alerts(){
    const today=this._today(),out=[];
    this.imports().forEach(s=>{
      if(s.stage==='received')return;
      const eta=this._dt(s.eta);if(!eta)return;
      const days=Math.round((eta-today)/86400000);
      if(days<0)out.push({s,days,kind:'late'});
      else if(days<=3)out.push({s,days,kind:'soon'});
    });
    this.exports().forEach(s=>{
      if(s.stage==='arrived')return;
      const eta=this._dt(s.eta);if(!eta)return;
      const days=Math.round((eta-today)/86400000);
      if(days<0)out.push({s,days,kind:'late'});
      else if(days<=3)out.push({s,days,kind:'soon'});
    });
    return out.sort((a,b)=>a.days-b.days);
  }
  // ── จัดการด่วนจาก panel แจ้งเตือน ──
  // "รับแล้ว": ปิดงานทันที (import→รับเข้าคลัง / export→ถึงปลายทาง) — บันทึกลง server เลย
  async quickCloseAlert(s){
    const stage=s._board==='export'?'arrived':'received';
    const actualDate=s.actualDate||new Date().toISOString().slice(0,10);
    const o={...(this._overrides[s.poNo]||{}),po_so:s.poNo,_board:s._board,_edited:true,_ts:Date.now(),stage,actualDate};
    this._overrides={...this._overrides,[s.poNo]:o};
    const rows=this.allShipments().map(x=>x.poNo===s.poNo?{...x,stage,actualDate,_stageManual:true,_edited:true}:x);
    this.setState({shipments:rows});
    try{
      const r=await fetch('/api/tracking/upsert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
      this.showToast(r.ok?('ปิดงาน '+s.poNo+' — '+(s._board==='export'?'ถึงปลายทาง':'รับเข้าคลัง')+'แล้ว'):'บันทึกไม่สำเร็จ',r.ok?'success':'error');
    }catch(e){this.showToast('ออฟไลน์ — บันทึกชั่วคราว','info');}
  }
  // "แก้ ETA": เปิด detail เข้าโหมดแก้ไขทันที (อัปเดตวันจริงจาก forwarder)
  openAlertEdit(s){
    this.setState({alertsOpen:false,tab:s._board,detailId:s.id,editing:false,editForm:null},()=>this.startEdit());
  }

  buildTimeline(s,tab){
    const stages=tab==='export'?EXP_STAGES:IMP_STAGES;
    const curIdx=stages.findIndex(x=>x.key===s.stage);
    const lastIdx=stages.length-1;
    // ขั้นสุดท้าย (รับเข้าคลัง/ถึงปลายทาง) ใช้วันที่รับจริง (actualDate) ถ้ามี — แม่นกว่า eta ที่เป็นแค่ประมาณการ
    const dateFor=k=>({po:'',booking:s.etd,transit:s.etd,arrived:s.actualDate||s.eta,customs:s.eta,received:s.actualDate||s.eta,draft:'',packing:s.etd,shipped:s.etd})[k];
    return stages.map((st,i)=>{
      // ขั้นสุดท้ายที่เป็นสถานะปัจจุบันแล้ว = จบกระบวนการ ไม่มีขั้นต่อไปให้ "กำลังดำเนินการ"
      // ต้องติ๊กถูกเหมือนขั้นก่อนหน้า ไม่ใช่วงกลมค้างแบบ current (เดิมค้างเป็นวงกลมว่างตลอดไป)
      const done=i<curIdx||(i===curIdx&&i===lastIdx);
      const cur=i===curIdx&&i!==lastIdx;
      return {key:st.key,label:st.label,done,cur,date:(done||cur)?fmtDate(dateFor(st.key))||'เสร็จสิ้น':'—',color:st.color,showLine:i<stages.length-1};
    });
  }

  renderKanban(tab){
    const {isNarrow,dragOverKey}=this.state;
    const list=this.filtered(tab);
    const stages=tab==='export'?EXP_STAGES:IMP_STAGES;
    // จัดกลุ่ม PO ที่ถูกแยกเป็น shipment ย่อย (poNo ต่อท้าย " (n)") ไว้ด้วยกัน เพื่อโชว์ป้าย "1/2","2/2"
    // ต้องนับจากทุกรายการ (ไม่ใช่แค่ list ที่ผ่านตัวกรอง/ค้นหา) ไม่งั้นถ้าค้นหา/กรองจนเห็นแค่บางตัวในกลุ่ม
    // ป้ายจะโชว์เลขผิด (เช่น "1/1" ทั้งที่จริงมี 2 shipment แต่อีกตัวโดนตัวกรองซ่อนไว้)
    const groups={};
    (tab==='export'?this.exports():this.imports()).forEach(s=>{const b=this.strip(s._splitBase||s.poNo);(groups[b]=groups[b]||[]).push(s);});
    Object.values(groups).forEach(g=>g.sort((a,b)=>{const oa=/\((\d+)\)$/.exec(a.poNo),ob=/\((\d+)\)$/.exec(b.poNo);return (oa?parseInt(oa[1],10):1)-(ob?parseInt(ob[1],10):1);}));
    return <div style={{flex:1,overflowX:'auto',overflowY:'hidden',minHeight:0,padding:'0 22px 22px',scrollSnapType:isNarrow?'x mandatory':'none'}}>
      <div style={{display:'flex',gap:'13px',height:'100%',alignItems:'stretch'}}>
        {stages.map(stg=>{
          const cards=list.filter(s=>s.stage===stg.key);

            onDragOver={e=>e.preventDefault()}

      </div>
    </div>;
  }

    </div>;

  // ── กราฟแท่งคู่ (Import/Export) ใช้ร่วมกันทั้งกราฟต้นทุนและกราฟจำนวน shipment ──
  // rows = [{label, [aKey]:number, [bKey]:number}], max = ค่าสูงสุดสำหรับสเกลความสูงแท่ง
  // fmtTip = format ค่าเดี่ยวสำหรับ tooltip เวลา hover, fmtPair = format ข้อความ "Import : Export" ใต้แท่ง
  renderBarChart(rows,aKey,bKey,max,fmtTip,fmtPair){
    const {isNarrow}=this.state;
    return <div style={{display:'flex',alignItems:'flex-end',gap:isNarrow?'10px':'22px',overflowX:'auto',paddingBottom:'6px',minHeight:'190px'}}>
      {rows.map(r=>(
        <div key={r.label} style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,minWidth:'74px'}}>
          <div style={{display:'flex',alignItems:'flex-end',gap:'5px',height:'140px'}}>
            <div title={'Import: '+fmtTip(r[aKey])} style={{width:'18px',height:Math.max(2,r[aKey]/max*140)+'px',background:'linear-gradient(180deg,#e8408e,#c91253)',borderRadius:'4px 4px 0 0'}}/>
            <div title={'Export: '+fmtTip(r[bKey])} style={{width:'18px',height:Math.max(2,r[bKey]/max*140)+'px',background:'linear-gradient(180deg,#a78bfa,#7c3aed)',borderRadius:'4px 4px 0 0'}}/>
          </div>
          <div style={{fontSize:'11px',fontWeight:600,color:'#14181f',marginTop:'8px',whiteSpace:'nowrap'}}>{r.label}</div>
          <div style={{fontSize:'10px',color:'#a99fa8',marginTop:'3px',whiteSpace:'nowrap',textAlign:'center'}}>{fmtPair(r[aKey],r[bKey])}</div>
        </div>
      ))}
    </div>;
  }

  renderDashboard(){
    const {isNarrow}=this.state;
    const impAll=this.imports(),expAll=this.exports();
    const impVal=impAll.reduce((a,s)=>a+s.amount*s.rate,0),expVal=expAll.reduce((a,s)=>a+s.amount*s.rate,0);
    // กำลังขนส่ง = เฉพาะสถานะที่ของยังเคลื่อนที่จริง (booking/transit) — arrived/customs คือของถึงท่า/อยู่พิธีการแล้ว ไม่ใช่ "กำลังขนส่ง"
    // รอดำเนินการ = customs (รอเคลียร์พิธีการ) หรือ po (ยังไม่ได้ book) — ไม่ทับซ้อนกับ activeImp ด้านบนแล้ว
    const activeImp=impAll.filter(s=>['booking','transit'].includes(s.stage)).length;
    const pendingImp=impAll.filter(s=>s.stage==='customs'||s.stage==='po').length;
    const kpis=[
      {accent:'linear-gradient(90deg,#c91253,#e8408e)',icon:'down',iconBg:'#fce7f3',iconColor:'#c91253',value:impAll.length,label:'Import ทั้งหมด',sub:fmtBaht(impVal)+' มูลค่ารวม'},
      {accent:'linear-gradient(90deg,#7c3aed,#a78bfa)',icon:'up',iconBg:'#ede9fe',iconColor:'#7c3aed',value:expAll.length,label:'Export ทั้งหมด',sub:fmtBaht(expVal)+' มูลค่ารวม'},
      {accent:'linear-gradient(90deg,#f59e0b,#ea580c)',icon:'ship',iconBg:'#fff7ed',iconColor:'#d97706',value:activeImp,label:'กำลังขนส่ง',sub:'อยู่ระหว่างทาง'},
      {accent:'linear-gradient(90deg,#059669,#10b981)',icon:'check',iconBg:'#f0fdf4',iconColor:'#059669',value:pendingImp,label:'รอดำเนินการ',sub:'ศุลกากร / PO ใหม่'}
    ];
    // pmax เดิมรวมสถานะ received (จบขั้นตอน) เข้ามาด้วย ทำให้ค่าสูงสุดเป็นของ received เสมอ (ในข้อมูลจริง ~277
    // เทียบกับสถานะอื่นหลักหน่วย) แท่งอื่นทุกแท่งเลยแคบจนดูเหมือน 0 ทั้งที่มีข้อมูล — คิด pmax จากสถานะที่ยังไหลอยู่
    // เท่านั้น (ตัด received ตัวสุดท้ายออก) แล้วให้แท่ง received เต็มความกว้างเป็นพิเศษแทน (ดูจุดใช้งานด้านล่าง)
    const pmaxInFlight=Math.max(1,...IMP_STAGES.slice(0,-1).map(stg=>impAll.filter(s=>s.stage===stg.key).length));
    const emax=Math.max(1,...EXP_STAGES.map(stg=>expAll.filter(s=>s.stage===stg.key).length));
    const costAll=impAll.filter(s=>costSum(s)>0);
    const costSrc=costAll.slice(0,7);
    // แถว "รวมทั้งหมด" ต้องรวมจาก costAll (ทุกรายการที่มีต้นทุน) ไม่ใช่ costSrc (7 แถวที่โชว์)
    // ไม่งั้นยอดรวมจะโกหกเมื่อมีรายการมากกว่า 7 — โชว์แค่บางแถวได้ แต่ยอดรวมต้องจริงเสมอ
    const tg=costAll.reduce((a,s)=>a+s.amount*s.rate,0),tf=costAll.reduce((a,s)=>a+(s.freight||0)+(s.clearance||0)+(s.insurance||0),0),tt=costAll.reduce((a,s)=>a+(s.duty||0)+(s.vat||0),0);

    // ── สรุป Transit Time เทียบ KPI (import + sea freight) ──
    const tstat=transitStats(impAll);

    // ── Top ผู้ขาย/ลูกค้าตามมูลค่า — ใช้ totalCostThb (มูลค่าสินค้า+ต้นทุนนำเข้า แปลงเป็นบาท) เหมือนตารางต้นทุน/กราฟไตรมาสด้านล่าง เพื่อให้ตัวเลขสอดคล้องกันทั้งหน้า ──
    const topByParty=(list)=>{
      const map={};
      list.forEach(s=>{const k=s.party||'—';const e=map[k]=map[k]||{party:k,value:0,count:0};e.value+=totalCostThb(s);e.count+=1;});
      return Object.values(map).sort((a,b)=>b.value-a.value).slice(0,10);
    };
    const topVendors=topByParty(impAll);
    const topCustomers=topByParty(expAll);

    // ── Company Split เดิมเทียบ KOB vs BTV ด้วย "จำนวนรายการ" (.length) เท่านั้น — เพิ่มมุมมอง "มูลค่า"
    // ควบคู่กันไป โดยรวม totalCostThb(s) ต่อบริษัท ใช้อนุสัญญาเดียวกับ topByParty ด้านบน (มูลค่าแปลงเป็นบาทแล้ว) ──
    const companySplit=[{label:'Import',list:impAll},{label:'Export',list:expAll}].map(c=>{
      const kobList=c.list.filter(s=>s.company==='KOB'),btvList=c.list.filter(s=>s.company==='BTV');
      return {label:c.label,kob:kobList.length,btv:btvList.length,
        kobVal:kobList.reduce((a,s)=>a+totalCostThb(s),0),btvVal:btvList.reduce((a,s)=>a+totalCostThb(s),0)};
    });

    // ── สัดส่วนสกุลเงินก่อนแปลงเป็นบาท (FX exposure) — จงใจไม่แปลงเป็นบาทตรงนี้ เพื่อดูยอดค้าง/ยอดรับตามสกุลเงินต้นฉบับจริง
    // แยก import/export เพราะ mix สกุลเงินอาจต่างกัน (เช่น import CNY เยอะ, export USD เยอะ) แสดง % จาก "จำนวนรายการ"
    // ต่อสกุลเงิน (ไม่ใช่ผลรวมยอดเงิน เพราะยอดเงินคนละสกุลบวกกันตรงๆไม่ได้ความหมาย) ──
    const curSplit=(list)=>{
      const map={};
      list.forEach(s=>{const k=s.cur||'—';const e=map[k]=map[k]||{cur:k,amount:0,count:0};e.amount+=(s.amount||0);e.count+=1;});
      const rows=Object.values(map).sort((a,b)=>b.count-a.count);
      const totCount=rows.reduce((a,r)=>a+r.count,0)||1;
      return rows.map(r=>({...r,pct:r.count/totCount*100}));
    };
    const impCurRows=curSplit(impAll),expCurRows=curSplit(expAll);

    // ── PO/SO ที่ค้างนาน: นับจาก orderDate (วันที่สั่งซื้อ) ถึงวันนี้ เฉพาะรายการที่ยังไม่จบสถานะ (received/arrived) ──
    // orderDate มาจาก mapPo (po.date_order/so.date_order) เป็นหลัก — รายการที่ไม่มี orderDate (เช่นข้อมูล fallback บางแหล่ง) จะข้ามไป ไม่นับเป็นค้างนานเพราะวัดไม่ได้
    // ใช้ _today()/_dt() (เที่ยงคืนท้องถิ่น + Math.round) แบบเดียวกับที่อื่นในไฟล์นี้ — เดิมใช้ Date.now() ดิบๆ
    // (มีเวลาปนอยู่) + Math.floor ทำให้นับวันได้ไม่ตรงกับจุดตัด 45/30 วัน ต่างกันได้ ±1 วันแล้วแต่เวลาที่เปิดหน้าเว็บ
    const todayMid=this._today();
    const daysSince=(s)=>{const d=this._dt(s.orderDate);return d?Math.round((todayMid-d)/86400000):null;};
    const impBacklog=impAll.map(s=>({s,days:daysSince(s)})).filter(x=>x.days!=null&&x.s.stage!=='received'&&x.days>45).sort((a,b)=>b.days-a.days);
    const expBacklog=expAll.map(s=>({s,days:daysSince(s)})).filter(x=>x.days!=null&&x.s.stage!=='arrived'&&x.days>30).sort((a,b)=>b.days-a.days);
    // PO ที่รับเข้าคลังครบแล้ว (stage สุดท้าย) แต่ยังไม่มีค่าใช้จ่ายนำเข้าบันทึกไว้เลย (costSum=0) — แทบไม่มี
    // PO นำเข้าจริงที่ไม่มีค่าขนส่ง/พิธีการเลย น่าจะเป็นสัญญาณว่าลืมบันทึกมากกว่าไม่มีค่าใช้จ่ายจริง
    const missingCost=impAll.filter(s=>s.stage==='received'&&costSum(s)===0);
    // เกินงบที่คาดการณ์ไว้เกิน 10% — ใช้ได้เฉพาะ shipment ที่กรอก expectedCost ไว้แล้วเท่านั้น (ผู้ใช้กรอกเอง
    // เพราะ Odoo ไม่มีประวัติราคาที่เสนอ/ประเมินไว้ก่อนหน้าให้ดึงมาใช้อัตโนมัติ)
    const overBudget=[...impAll,...expAll].filter(s=>s.expectedCost>0&&(totalCostThb(s)-s.expectedCost)/s.expectedCost>0.1);

    // ── สัดส่วนต้นทุนตามปี: Import vs Export ──
    const yearMap={};
    impAll.forEach(s=>{const y=yearOf(s);if(y==null)return;(yearMap[y]=yearMap[y]||{imp:0,exp:0}).imp+=totalCostThb(s);});
    expAll.forEach(s=>{const y=yearOf(s);if(y==null)return;(yearMap[y]=yearMap[y]||{imp:0,exp:0}).exp+=totalCostThb(s);});
    // label = ค.ศ. นำ + (พ.ศ. ตามหลัง) เช่น "2025 (พ.ศ. 2568)" — เดิมเอาเลข พ.ศ. แบบสั้น (68/69)
    // ไปแสดงเป็นตัวเลขนำหน้าโดยไม่ตั้งใจ ทำให้อ่านสับสนว่าเป็นปีอะไร
    const nowYear=new Date().getFullYear();
    // ตัดปีที่ยังไม่เริ่ม (อนาคตล้วนๆ เช่น PO ที่ตั้งวันที่ล่วงหน้าข้ามปี) ออกจากกราฟเทรนด์ — ไม่ใช่ข้อมูลจริงที่เกิดขึ้นแล้ว
    const yearRows=Object.keys(yearMap).map(Number).filter(y=>y<=nowYear).sort((a,b)=>a-b).map(y=>{
      const v=yearMap[y],tot=v.imp+v.exp||1;
      return {year:y,label:y+' (พ.ศ. '+(y+543)+')',imp:v.imp,exp:v.exp,tot:v.imp+v.exp,impPct:v.imp/tot*100,expPct:v.exp/tot*100};
    });
    // เดิมเช็คแค่ตำแหน่งแถวสุดท้าย ถ้ามีข้อมูลปีถัดไปแทรกมา (เช่น PO ล่วงหน้า) แถวปีปัจจุบันจะไม่ใช่แถวสุดท้ายแล้ว
    // ทำให้ป้ายเตือนไม่ขึ้นทั้งที่ควรขึ้น — เช็คจากปีจริงแทนตำแหน่ง
    const yearLatestPartial=yearRows.some(y=>y.year===nowYear);

    // ── เทียบต้นทุนตามไตรมาส (1 ปี = 3 ไตรมาส: Q1 ม.ค.-เม.ย., Q2 พ.ค.-ส.ค., Q3 ก.ย.-ธ.ค.) ──
    const qMap={};
    // เก็บทั้งค่าใช้จ่าย (imp/exp) และจำนวน shipment (impN/expN) ต่อไตรมาสในรอบเดียว
    const addQ=(s,costField,countField)=>{const q=quarterOf(s);if(!q)return;const e=qMap[q.key]=qMap[q.key]||{y:q.y,q:q.q,label:q.label,imp:0,exp:0,impN:0,expN:0};e[costField]+=totalCostThb(s);e[countField]+=1;};
    impAll.forEach(s=>addQ(s,'imp','impN')); expAll.forEach(s=>addQ(s,'exp','expN'));
    const nowQ=quarterOf({etd:new Date().toISOString().slice(0,10)});
    // ตัดไตรมาสที่ยังไม่เริ่ม (อนาคตล้วนๆ) ออกจากกราฟเทรนด์ ด้วยเหตุผลเดียวกับปี — PO ล่วงหน้าไม่ใช่เทรนด์จริง
    const qRows=Object.keys(qMap).map(k=>qMap[k])
      .filter(r=>!(nowQ&&(r.y>nowQ.y||(r.y===nowQ.y&&r.q>nowQ.q))))
      .sort((a,b)=>a.y-b.y||a.q-b.q);
    const qMax=Math.max(1,...qRows.map(r=>Math.max(r.imp,r.exp)));
    const qMaxN=Math.max(1,...qRows.map(r=>Math.max(r.impN,r.expN)));
    // มูลค่าเฉลี่ยต่อออเดอร์ต่อไตรมาส = ต้นทุนรวม (imp/exp) หารด้วยจำนวน shipment (impN/expN) ของไตรมาสนั้น
    qRows.forEach(r=>{r.impAvg=r.impN>0?r.imp/r.impN:0;r.expAvg=r.expN>0?r.exp/r.expN:0;});
    const qAvgMax=Math.max(1,...qRows.map(r=>Math.max(r.impAvg,r.expAvg)));
    // หาแถวไตรมาสปัจจุบันจากค่าปี/ไตรมาสจริง (ไม่ใช่ตำแหน่งแถวสุดท้าย) เพื่อติดป้าย "ยังไม่ครบช่วงเวลา" ให้ถูกแถวเสมอ
    const qCurrentRow=nowQ?qRows.find(r=>r.y===nowQ.y&&r.q===nowQ.q):null;
    const qLatestPartial=!!qCurrentRow;
    return <div style={{flex:1,overflowY:'auto',padding:'22px'}}>
      <div style={{maxWidth:'1240px',margin:'0 auto',display:'flex',flexDirection:'column',gap:'18px'}}>
        <div style={{display:'grid',gridTemplateColumns:isNarrow?'repeat(2,1fr)':'repeat(4,1fr)',gap:isNarrow?'12px':'16px'}}>
          {kpis.map(k=><div key={k.label} style={{background:'#fff',border:'1px solid #e8dde4',borderRadius:'15px',padding:'18px 18px 16px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:'3px',background:k.accent}}/>
            <div style={{display:'flex',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:'38px',height:'38px',borderRadius:'11px',background:k.iconBg,color:k.iconColor}}><Ico name={k.icon} size={18} sw={1.8}/></span>
            </div>
            <div style={{fontSize:'27px',fontWeight:700,color:'#14181f',marginTop:'14px',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{k.value}</div>
            <div style={{fontSize:'12.5px',color:'#7a818d',marginTop:'6px'}}>{k.label}</div>
            <div style={{fontSize:'11px',color:'#a99fa8',marginTop:'4px'}}>{k.sub}</div>
          </div>)}
        </div>
        {(()=>{
          // สรุปข้อยกเว้นรวมจุดเดียว — ไม่คำนวณซ้ำ ดึงจากตัวเลขที่มีอยู่แล้ว (integrity/aging/missingCost)
          // ให้ manager กวาดตาดูจุดเดียวว่ามีอะไรต้องตามไหม ก่อนลงรายละเอียดในแต่ละ panel ด้านล่าง
          const ir=this.state.integrityReport;
          const curFindings=(ir&&Array.isArray(ir.findings))?ir.findings.length:0;
          const agingCount=impBacklog.length+expBacklog.length;
          const items=[
            {n:curFindings,label:'ความผิดปกติสกุลเงิน',key:'currency'},
            {n:agingCount,label:'PO/SO ค้างนาน',key:'aging'},
            {n:missingCost.length,label:'รับของแล้วแต่ยังไม่บันทึกค่าใช้จ่าย',key:'cost'},
            {n:overBudget.length,label:'เกินงบที่คาดการณ์ไว้ >10%',key:'budget'},
          ];
          const totalEx=items.reduce((a,x)=>a+x.n,0);
          return <div style={{background:'#fff',border:'1px solid '+(totalEx?'#fecaca':'#e8dde4'),borderRadius:'15px',padding:'18px 22px',display:'flex',flexDirection:'column',gap:'12px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'10px',flexWrap:'wrap'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <span style={{width:'9px',height:'9px',borderRadius:'50%',background:totalEx?'#dc2626':'#16a34a',flexShrink:0}}/>
                <span style={{fontSize:'14.5px',fontWeight:600,color:'#14181f'}}>สรุปข้อยกเว้นที่ควรตรวจสอบ</span>
              </div>
              <button onClick={()=>this.exportAccountingReport(qRows)} title="ดาวน์โหลด Excel: Import+Export ทุกรายการ + สรุปรายไตรมาส สำหรับกระทบยอดกับบัญชี" style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 12px',border:'1.5px solid #e8dde4',borderRadius:'8px',background:'#fff',color:'#15803d',fontFamily:'inherit',fontSize:'11.5px',fontWeight:600,cursor:'pointer',flexShrink:0}}><Ico name="dl" size={13} sw={2}/>Export รายงานบัญชี</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:isNarrow?'1fr':'repeat(4,1fr)',gap:isNarrow?'10px':'14px'}}>
              {items.map(x=>(
                <div key={x.key} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',borderRadius:'10px',background:x.n?'#fef2f2':'#f0fdf4',border:'1px solid '+(x.n?'#fecaca':'#bbf7d0')}}>
                  <span style={{fontSize:'20px',fontWeight:700,color:x.n?'#dc2626':'#16a34a',fontVariantNumeric:'tabular-nums'}}>{x.n}</span>
                  <span style={{fontSize:'12px',color:'#5b6371'}}>{x.label}</span>
                </div>
              ))}
            </div>
            {missingCost.length>0&&<div style={{display:'flex',flexDirection:'column',gap:'6px',marginTop:'2px'}}>
              {missingCost.slice(0,5).map(s=>(
                <div key={s.id} onClick={()=>this.setState({tab:'import',detailId:s.id,view:'kanban'})} style={{fontSize:'12px',color:'#991b1b',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'8px',padding:'8px 11px',cursor:'pointer',display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{s.poNo}</span>
                  <span>{s.party}</span>
                </div>
              ))}
              {missingCost.length>5&&<div style={{fontSize:'11px',color:'#a99fa8'}}>และอีก {missingCost.length-5} รายการ</div>}
            </div>}

              {[['BL / AWB','bl','text','เช่น COSU1234567'],['ตู้คอนเทนเนอร์','container','text','เช่น TGHU5521430'],['เรือ / เที่ยว','vessel','text','เช่น COSCO HARMONY'],['ETD — วันออกเดินทาง','etd','date',''],['ETA — วันถึงปลายทาง (ประมาณ)','eta','date','']].map(([l,k,t,ph])=>(
                <div key={k}><div style={{fontSize:'11px',color:'#a99fa8',marginBottom:'5px'}}>{l}</div><input value={ef[k]||''} onChange={e=>this.setEdit(k,e.target.value)} type={t} placeholder={ph} style={INP}/></div>
