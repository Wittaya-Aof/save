              <div><div style={{fontSize:'11px',color:'#a99fa8',marginBottom:'5px'}}>{ef.board==='export'?'วันที่ถึงปลายทางจริง (Actual)':'วันที่รับเข้าคลังจริง (Actual)'}</div>
                <input value={ef.actualDate||''} onChange={e=>this.setEdit('actualDate',e.target.value)} type="date" style={INP}/></div>
              {(()=>{const ti=transitInfo({...ef,_board:ef.board});if(!ti)return null;
                const variance=ti.kpi?ti.days-ti.kpi.days:null;
                const color=variance==null?'#2563eb':variance<=0?'#15803d':variance<=2?'#d97706':'#dc2626';
                return <div style={{background:color+'12',border:'1px solid '+color+'33',borderRadius:'10px',padding:'10px 12px',fontSize:'12px',color}}>
                  Transit {ti.days} วัน{ti.kpi?(' · มาตรฐาน '+ti.kpi.label+' '+ti.kpi.days+' วัน · '+(variance<=0?('เร็วกว่า '+Math.abs(variance)+' วัน'):('ล่าช้า '+variance+' วัน'))):''}
                </div>;
              })()}
              <div><div style={{fontSize:'11px',color:'#a99fa8',marginBottom:'5px'}}>Freight Forwarder</div>
                <input value={ef.forwarder||''} onChange={e=>this.setEdit('forwarder',e.target.value)} list="kobVL" placeholder="พิมพ์เพื่อค้นหา vendor…" style={INP}/>
                <datalist id="kobVL">{vList.slice(0,500).map(v=><option key={v.name} value={v.name}/>)}</datalist></div>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',margin:'20px 0 11px'}}>
              <SectionTitle>ต้นทุน (บาท)</SectionTitle>
              <button onClick={()=>this.openBillPicker()} style={{display:'inline-flex',alignItems:'center',gap:'5px',padding:'6px 11px',border:'1.5px solid #c91253',borderRadius:'8px',background:'#fff',color:'#c91253',fontFamily:'inherit',fontSize:'11.5px',fontWeight:600,cursor:'pointer'}}><Ico name="boxes" size={13} sw={1.8}/>เลือกบิลจาก Odoo</button>
            </div>
            {Array.isArray(ef.bills)&&ef.bills.length>0&&<div style={{display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px',background:'#faf6f8',border:'1px solid #f0e9ed',borderRadius:'10px',padding:'10px 12px'}}>
              <div style={{fontSize:'10.5px',fontWeight:700,color:'#a99fa8',letterSpacing:'.4px'}}>บิลที่จับคู่ ({ef.bills.length})</div>
              {ef.bills.map(b=><div key={b.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',fontSize:'11.5px'}}>
                <span style={{color:'#5b6371',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.partner}</span>
                <span style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
                  <span style={billCatSty(b.category)}>{billCatLabel(b.category)}</span>
                  <span style={{fontWeight:600,color:'#14181f',fontVariantNumeric:'tabular-nums'}}>฿{Math.round(b.amount).toLocaleString()}</span>
                </span>
              </div>)}
            </div>}
            <div style={{display:'flex',flexDirection:'column',gap:'13px'}}>
              {[['ค่าขนส่ง (Freight)','freight'],['ค่าเดินพิธีการ (Clearance)','clearance'],['ค่าประกันภัย (Insurance)','insurance'],['อากรขาเข้า (Import Duty)','duty'],['ภาษีมูลค่าเพิ่ม (VAT)','vat']].map(([l,k])=>(
                <div key={k}><div style={{fontSize:'11px',color:'#a99fa8',marginBottom:'5px'}}>{l}</div><input value={ef[k]===''||ef[k]==null?'':ef[k]} onChange={e=>this.setEdit(k,e.target.value)} type="number" placeholder="0" style={INP}/></div>
              ))}
            </div>
            {costSrc&&<div style={{fontSize:'11px',color:costSrc.includes('ไม่พบ')?'#b91c1c':'#15803d',marginTop:'4px'}}>{costSrc}</div>}
            <div style={{marginTop:'16px'}}>
              <div style={{fontSize:'11px',color:'#a99fa8',marginBottom:'5px'}}>ต้นทุนที่คาดการณ์ไว้ (บาท) — กรอกไว้เทียบกับต้นทุนจริงภายหลัง (ไม่บังคับ)</div>
              <input value={ef.expectedCost===''||ef.expectedCost==null?'':ef.expectedCost} onChange={e=>this.setEdit('expectedCost',e.target.value)} type="number" placeholder="ไม่ระบุ" style={INP}/>
            </div>
            <div style={{fontSize:'11px',fontWeight:700,color:'#a99fa8',letterSpacing:'.6px',textTransform:'uppercase',margin:'22px 0 11px'}}>ปรับสถานะ</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'7px'}}>
              {stages.map(stg=>{const active=curStage===stg.key;return(
                <button key={stg.key} onClick={()=>this.setEdit('stage',stg.key)} style={{padding:'7px 12px',borderRadius:'9px',border:active?'1.5px solid '+stg.color:'1.5px solid #e8dde4',background:active?stg.color+'15':'#fff',color:active?stg.color:'#5b6371',fontFamily:'inherit',fontSize:'12px',fontWeight:active?600:500,cursor:'pointer'}}>{stg.label}</button>
              );})}
            </div>
            {(sel._odooState||sel._receiptStatus)&&<div style={{fontSize:'11px',color:'#a99fa8',marginTop:'10px'}}>สถานะดิบจาก Odoo: {odooStateLabel(sel._odooState)}{sel._receiptStatus?' · การรับของ: '+receiptStatusLabel(sel._receiptStatus):''}</div>}
            <div style={{fontSize:'11px',fontWeight:700,color:'#a99fa8',letterSpacing:'.6px',textTransform:'uppercase',margin:'22px 0 11px'}}>ธงพิเศษ / หมายเหตุ</div>
            <label style={{display:'flex',alignItems:'center',gap:'9px',cursor:'pointer',marginBottom:'13px'}}>
              <input type="checkbox" checked={!!ef.overReceipt} onChange={e=>this.toggleOverReceipt(e.target.checked)} style={{width:'17px',height:'17px',accentColor:'#c91253',cursor:'pointer'}}/>
              <span style={{fontSize:'12.5px',color:'#14181f'}}>PO นี้เปิดเพื่อรับของส่วนเกินจากซัพพลายเออร์ (Over-receipt)</span>
            </label>
            {ef.overReceipt&&<div style={{fontSize:'11px',color:'#b45309',marginTop:'-6px',marginBottom:'13px'}}>✓ ปรับสถานะเป็น{ef.board==='export'?'ถึงปลายทาง':'รับเข้าคลัง'}ให้อัตโนมัติ — ของถึงจริงแล้วจึงเปิด PO นี้</div>}
            <textarea value={ef.note||''} onChange={e=>this.setEdit('note',e.target.value)} placeholder="หมายเหตุเพิ่มเติม เช่น อ้างอิง PO ต้นทาง, เหตุผลที่ของเกิน…" rows={3} style={{...INP,height:'auto',padding:'9px 11px',resize:'vertical',fontFamily:'inherit'}}/>
          </div>}
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #e8dde4',display:'flex',gap:'10px'}}>
          {!editing&&<>
            <button onClick={()=>this.splitShipment()} title="แยกเป็น shipment ย่อยใหม่ (PO เดียวกัน ส่งคนละรอบ)" style={{width:'40px',height:'40px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}><Ico name="split" size={16} sw={1.8}/></button>
            {sel._synthetic&&<button onClick={()=>this.openDeleteDialog(sel.poNo)} title="ลบ shipment ย่อยนี้ (ต้องมีรหัสผ่านผู้มีอำนาจ)" style={{width:'40px',height:'40px',border:'1.5px solid #fecaca',borderRadius:'10px',background:'#fff',color:'#dc2626',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}><Ico name="trash" size={16} sw={1.8}/></button>}
            <button onClick={()=>this.setState({detailId:null})} style={{flex:1,height:'40px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13px',fontWeight:500,cursor:'pointer'}}>ปิด</button>
            <button onClick={()=>this.startEdit()} style={{flex:1,height:'40px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}><Ico name="edit" size={15} sw={1.8}/>แก้ไข</button>
          </>}
          {editing&&<>
            <button onClick={()=>this.cancelEdit()} style={{flex:1,height:'40px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
            <button onClick={()=>this.saveEdit()} style={{flex:1,height:'40px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13px',fontWeight:600,cursor:savingEdit?'default':'pointer',opacity:savingEdit?0.75:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}><Ico name="check" size={15} sw={2.2}/>{savingEdit?'กำลังบันทึก…':'บันทึก'}</button>
          </>}
        </div>
      </div>
      {billPicker&&this.renderBillPicker()}
      {deleteDialog&&this.renderDeleteDialog()}
    </>;
  }

  renderDeleteDialog(){
    const d=this.state.deleteDialog;if(!d)return null;
    return <>
      <div onClick={()=>!d.busy&&this.closeDeleteDialog()} style={{position:'fixed',inset:0,background:'rgba(20,24,31,.5)',zIndex:70,animation:'kobFadeIn .2s ease'}}/>
      <div style={{position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:'360px',maxWidth:'90vw',background:'#fff',borderRadius:'14px',zIndex:71,boxShadow:'0 20px 60px rgba(20,24,31,.25)',padding:'22px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}}>
          <span style={{color:'#dc2626',display:'flex'}}><Ico name="trash" size={18} sw={1.8}/></span>
          <div style={{fontSize:'15px',fontWeight:700,color:'#14181f'}}>ลบ shipment ย่อย</div>
        </div>
        <div style={{fontSize:'12.5px',color:'#5b6371',marginBottom:'14px'}}>ยืนยันลบ <b style={{fontFamily:"'IBM Plex Mono',monospace"}}>{d.poNo}</b> — ลบแล้วกู้คืนไม่ได้ ต้องใส่รหัสผ่านของผู้มีอำนาจลบ</div>
        {/* type="text" ไม่ mask ตัวอักษร — ตั้งใจไม่ใช้ type="password" เพราะ Chrome autofill/password
            manager จะแทรกแซงค่าที่พิมพ์จริงได้ (ค่าที่ submit ไม่ตรงกับที่เห็นบนจอ) ทำให้ลบไม่สำเร็จ
            ทั้งที่ดูเหมือนพิมพ์รหัสถูกแล้ว — รหัสนี้เป็น PIN ใช้ร่วมกันในทีม ไม่ใช่รหัสผ่านล็อกอินส่วนตัว */}
        <input type="text" autoComplete="off" value={d.password} onChange={e=>this.setState({deleteDialog:{...d,password:e.target.value,error:''}})} onKeyDown={e=>e.key==='Enter'&&this.confirmDelete()} placeholder="รหัสผ่านผู้มีอำนาจลบ" autoFocus style={INP}/>
        {d.error&&<div style={{fontSize:'11.5px',color:'#dc2626',marginTop:'8px'}}>{d.error}</div>}
        <div style={{display:'flex',gap:'10px',marginTop:'16px'}}>
          <button onClick={()=>this.closeDeleteDialog()} style={{flex:1,height:'38px',border:'1.5px solid #e8dde4',borderRadius:'9px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'12.5px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
          <button onClick={()=>this.confirmDelete()} disabled={d.busy||!d.password} style={{flex:1,height:'38px',border:0,borderRadius:'9px',background:'#dc2626',color:'#fff',fontFamily:'inherit',fontSize:'12.5px',fontWeight:600,cursor:(d.busy||!d.password)?'default':'pointer',opacity:(d.busy||!d.password)?0.6:1}}>{d.busy?'กำลังลบ…':'ยืนยันลบ'}</button>
        </div>
      </div>
    </>;
  }
  renderBillPicker(){
    const {billList,billLoading,billQuery,billError,selBills}=this.state;
    const q=(billQuery||'').trim().toLowerCase();
    const all=billList||[];
    const list=q?all.filter(b=>((b.partner||'')+' '+(b.bill||'')+' '+(b.ref||'')+' '+(b.date||'')).toLowerCase().includes(q)):all;
    // บิลที่ถูกจับคู่กับ shipment อื่นไปแล้ว → เตือนกันต้นทุนนับซ้ำ
    const curPo=this.state.editForm?this.state.editForm.poNo:'';
    const usedBy={};const ovAll=this._overrides||{};
    Object.keys(ovAll).forEach(k=>{if(k===curPo)return;((ovAll[k]&&ovAll[k].bills)||[]).forEach(b=>{if(b&&b.id!=null&&!usedBy[b.id])usedBy[b.id]=k;});});
    const sel=selBills||{};
    const selArr=Object.values(sel);
    const sums={freight:0,clearance:0,insurance:0,duty:0,vat:0};
    selArr.forEach(b=>{Object.keys(sums).forEach(k=>{sums[k]+=b[k]||0;});});
    const sumAll=sums.freight+sums.clearance+sums.insurance+sums.duty+sums.vat;
    return <>
      <div onClick={()=>this.closeBillPicker()} style={{position:'fixed',inset:0,background:'rgba(20,24,31,.45)',zIndex:70,animation:'kobFadeIn .2s ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:'520px',maxWidth:'96vw',background:'#fff',zIndex:71,boxShadow:'-12px 0 40px rgba(20,24,31,.18)',display:'flex',flexDirection:'column',animation:'kobSlideIn .26s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{padding:'20px 22px 14px',borderBottom:'1px solid #e8dde4'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <div><div style={{fontSize:'16px',fontWeight:700,color:'#14181f'}}>เลือกบิลค่าขนส่ง / ภาษี</div>
              <div style={{fontSize:'11.5px',color:'#a99fa8',marginTop:'2px'}}>จาก Odoo · เลือกบิลที่เป็นของ shipment นี้ (เลือกได้หลายใบ)</div></div>
            <button onClick={()=>this.closeBillPicker()} style={{marginLeft:'auto',display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',borderRadius:'9px',border:'1px solid #e8dde4',background:'#fff',color:'#7a818d',cursor:'pointer',flexShrink:0}}><Ico name="close" size={16} sw={1.9}/></button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#faf6f8',border:'1.5px solid #e8dde4',borderRadius:'9px',padding:'0 12px',height:'38px',marginTop:'14px'}}>
            <span style={{display:'flex',color:'#a99fa8'}}><Ico name="search" size={16} sw={1.8}/></span>
            <input value={billQuery} onChange={e=>this.setState({billQuery:e.target.value})} placeholder="ค้นหา ผู้ขาย / เลขบิล / วันที่…" style={{border:0,outline:0,background:'transparent',fontFamily:'inherit',fontSize:'13px',color:'#14181f',width:'100%'}}/>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
          {billLoading&&<div style={{textAlign:'center',color:'#a99fa8',fontSize:'13px',padding:'40px 0'}}>กำลังโหลดบิลจาก Odoo… (ไม่เกิน 15 วินาที)</div>}
          {!billLoading&&billError&&<div style={{textAlign:'center',padding:'40px 0'}}>
            <div style={{color:'#b91c1c',fontSize:'13px',marginBottom:'12px'}}>เชื่อมต่อ Odoo ไม่สำเร็จ</div>
            <button onClick={()=>{this._billListCompany=null;this.openBillPicker();}} style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'8px 16px',border:'1.5px solid #c91253',borderRadius:'9px',background:'#fff',color:'#c91253',fontFamily:'inherit',fontSize:'12.5px',fontWeight:600,cursor:'pointer'}}><Ico name="sync" size={13} sw={2}/>ลองอีกครั้ง</button>
          </div>}
          {!billLoading&&!billError&&list.length===0&&<div style={{textAlign:'center',color:'#bcb2ba',fontSize:'13px',padding:'40px 0'}}>ไม่พบบิล{q?'ที่ตรงกับคำค้น':''}</div>}
          {!billLoading&&list.map(b=>{
            const on=!!sel[b.id];
            const used=usedBy[b.id];
            return <div key={b.id} onClick={()=>this.toggleBill(b)} style={{display:'flex',alignItems:'center',gap:'11px',padding:'11px 12px',marginBottom:'7px',border:on?'1.5px solid #c91253':'1.5px solid #ece3e8',borderRadius:'11px',background:on?'#fdf2f8':(used?'#fffbeb':'#fff'),cursor:'pointer',opacity:used&&!on?0.75:1}}>
              <span style={{width:'20px',height:'20px',borderRadius:'6px',border:on?'0':'1.5px solid #d9d0d6',background:on?'#c91253':'#fff',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{on&&<Ico name="check" size={13} sw={2.6}/>}</span>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:'12.5px',fontWeight:600,color:'#14181f',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.partner}</div>
                <div style={{display:'flex',alignItems:'center',gap:'7px',marginTop:'3px',flexWrap:'wrap'}}>
                  <span style={billCatSty(b.category)}>{billCatLabel(b.category)}</span>
                  <span style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:b.kind==='po'?'#f3edf0':'#dcfce7',color:b.kind==='po'?'#7a818d':'#15803d'}}>{b.kind==='po'?'PO รอบิล':'จ่ายจริง'}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'10.5px',color:'#a99fa8'}}>{b.bill}</span>
                  <span style={{fontSize:'10.5px',color:'#a99fa8'}}>· {fmtDate(b.date)}</span>
                  {used&&<span style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:'#fef3c7',color:'#b45309'}}>ใช้กับ {used} แล้ว</span>}
                </div>
              </div>
              <span style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:'13px',fontWeight:700,color:'#14181f',fontVariantNumeric:'tabular-nums'}}>฿{Math.round(b.amount).toLocaleString()}</div>
                {/* โชว์ยอดต้นฉบับ+อัตราแลกเปลี่ยนเมื่อบิลไม่ใช่ THB — กันประวัติ bug ที่เคยเอายอดสกุลต่างประเทศมานับเป็นบาทตรงๆ
                    โดยไม่มีอะไรฟ้องเลยว่าแปลงหรือยัง ให้ผู้ใช้เช็คด้วยตาได้ว่าเลขบาทสมเหตุสมผลกับยอดเดิมไหม */}
                {b.origAmount!=null&&<div style={{fontSize:'10px',color:'#a99fa8',marginTop:'2px'}}>{fmtAmt(b.origAmount,b.currency)} × {b.fxRate.toFixed(2)}</div>}
              </span>
            </div>;
          })}
        </div>
        <div style={{padding:'12px 22px 14px',borderTop:'1px solid #e8dde4'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'10px',fontSize:'11px',color:'#7a818d',marginBottom:'10px',flexWrap:'wrap'}}>
            <span style={{fontWeight:600}}>เลือก {selArr.length} รายการ</span>
            <span style={{fontVariantNumeric:'tabular-nums',textAlign:'right'}}>
              {['freight','clearance','insurance','duty','vat'].filter(k=>sums[k]>0).map(k=>billCatLabel(k)+' ฿'+Math.round(sums[k]).toLocaleString()).join(' · ')||'—'}
            </span>
          </div>
          <div style={{display:'flex',gap:'10px'}}>
            <button onClick={()=>this.closeBillPicker()} style={{flex:1,height:'42px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13.5px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
            <button onClick={()=>this.applySelectedBills()} style={{flex:2,height:'42px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13.5px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px'}}><Ico name="check" size={16} sw={2.2}/>ใช้รายการที่เลือก (฿{Math.round(sumAll).toLocaleString()})</button>
          </div>
        </div>
      </div>
    </>;
  }

  // ── Panel รายการต้องติดตาม (ETA เลยกำหนด / ใกล้ถึง) ──
  renderAlerts(){
    const al=this.alerts();
    return <>
      <div onClick={()=>this.setState({alertsOpen:false})} style={{position:'fixed',inset:0,background:'rgba(20,24,31,.4)',zIndex:60,animation:'kobFadeIn .2s ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:'420px',maxWidth:'94vw',background:'#fff',zIndex:61,boxShadow:'-12px 0 40px rgba(20,24,31,.16)',display:'flex',flexDirection:'column',animation:'kobSlideIn .26s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'20px 22px 16px',borderBottom:'1px solid #e8dde4'}}>
          <div><div style={{fontSize:'16px',fontWeight:700,color:'#14181f'}}>ต้องติดตาม ({al.length})</div>
            <div style={{fontSize:'11.5px',color:'#a99fa8',marginTop:'2px'}}>ETA เลยกำหนด หรือถึงภายใน 3 วัน (ยังไม่ปิดงาน)</div></div>
          <button onClick={()=>this.setState({alertsOpen:false})} style={{marginLeft:'auto',display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',borderRadius:'9px',border:'1px solid #e8dde4',background:'#fff',color:'#7a818d',cursor:'pointer',flexShrink:0}}><Ico name="close" size={16} sw={1.9}/></button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'14px 16px'}}>
          {al.length===0&&<div style={{textAlign:'center',color:'#bcb2ba',fontSize:'13px',padding:'40px 0'}}>ไม่มีรายการค้างติดตาม 🎉</div>}
          {al.map(({s,days,kind})=>{
            const tab=s._board==='export'?'export':'import';
            return <div key={s.id} style={{padding:'11px 13px',marginBottom:'8px',border:'1px solid #ece3e8',borderLeft:'3px solid '+(kind==='late'?'#dc2626':'#d97706'),borderRadius:'0 10px 10px 0',background:'#fff'}}>
              <div onClick={()=>this.setState({alertsOpen:false,tab:s._board,detailId:s.id,editing:false,editForm:null})} style={{display:'flex',alignItems:'center',gap:'11px',cursor:'pointer'}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                    <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'11.5px',fontWeight:600,color:'#14181f'}}>{s.poNo}</span>
                    <span style={coBadgeSty(s.company)}>{s.company}</span>
                  </div>
                  <div style={{fontSize:'11.5px',color:'#7a818d',marginTop:'3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.party}</div>
                  <div style={{display:'flex',alignItems:'center',gap:'7px',marginTop:'5px'}}>
                    <span style={stageBadgeSty(tab,s.stage)}><span style={stageDotSty(tab,s.stage)}/>{stageMeta(tab,s.stage).label}</span>
                    <span style={{fontSize:'11px',color:'#a99fa8'}}>ETA {fmtDate(s.eta)}</span>
                  </div>
                </div>
                <span style={{fontSize:'11.5px',fontWeight:700,color:kind==='late'?'#dc2626':'#d97706',whiteSpace:'nowrap',flexShrink:0}}>{days<0?('เลย '+Math.abs(days)+' วัน'):days===0?'ถึงวันนี้':('อีก '+days+' วัน')}</span>
              </div>
              <div style={{display:'flex',gap:'7px',marginTop:'9px'}}>
                <button onClick={e=>{e.stopPropagation();this.quickCloseAlert(s);}} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'5px',height:'30px',border:'1.5px solid #bbf7d0',borderRadius:'8px',background:'#f0fdf4',color:'#15803d',fontFamily:'inherit',fontSize:'11.5px',fontWeight:600,cursor:'pointer'}}><Ico name="check" size={13} sw={2.4}/>{s._board==='export'?'ถึงปลายทางแล้ว':'รับเข้าคลังแล้ว'}</button>
                <button onClick={e=>{e.stopPropagation();this.openAlertEdit(s);}} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'5px',height:'30px',border:'1.5px solid #e8dde4',borderRadius:'8px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'11.5px',fontWeight:600,cursor:'pointer'}}><Ico name="cal" size={13} sw={1.8}/>แก้ ETA / สถานะ</button>
              </div>
            </div>;
          })}
        </div>
      </div>
    </>;
  }

  renderCreateForm(){
    const {creating,saving,form}=this.state;
    if(!creating)return null;
    const sf=(k,v)=>this.setState(s=>({form:{...s.form,[k]:v}}));
    return <>
      <div onClick={()=>this.setState({creating:false})} style={{position:'fixed',inset:0,background:'rgba(20,24,31,.4)',zIndex:62,animation:'kobFadeIn .2s ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:'520px',maxWidth:'96vw',background:'#fff',zIndex:63,boxShadow:'-12px 0 40px rgba(20,24,31,.16)',display:'flex',flexDirection:'column',animation:'kobSlideIn .26s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'20px 22px 16px',borderBottom:'1px solid #e8dde4'}}>
          <div style={{fontSize:'16px',fontWeight:700,color:'#14181f'}}>{form.board==='export'?'เพิ่มรายการส่งออก':'เพิ่มรายการนำเข้า'}</div>
          <button onClick={()=>this.setState({creating:false})} style={{marginLeft:'auto',display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',borderRadius:'9px',border:'1px solid #e8dde4',background:'#fff',color:'#7a818d',cursor:'pointer',flexShrink:0}}><Ico name="close" size={16} sw={1.9}/></button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'20px 22px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
            <FSelect label="ประเภทรายการ" value={form.board} onChange={e=>sf('board',e.target.value)}>
              <option value="import">Import (นำเข้า)</option><option value="export">Export (ส่งออก)</option>
            </FSelect>
            <FSelect label="บริษัท" value={form.company} onChange={e=>sf('company',e.target.value)}>
              <option value="KOB">KOB</option><option value="BTV">BTV</option>
            </FSelect>
            <FInput label="เลขที่ PO / SO" value={form.poNo} placeholder="KOBPO2605-…" onChange={e=>sf('poNo',e.target.value)}/>
            <FSelect label="ประเภทสินค้า" value={form.type} onChange={e=>sf('type',e.target.value)}>
              <option value="oversea">Oversea</option><option value="pk">Packaging</option><option value="fg">Finished</option>
            </FSelect>
            <div style={{gridColumn:'1 / -1'}}><FInput label="ผู้ขาย / ลูกค้า" value={form.party} placeholder="ชื่อบริษัทคู่ค้า" onChange={e=>sf('party',e.target.value)}/></div>
            <ShipModeFields v={form} set={sf}/>
            <FInput label="ตัวแทนขนส่ง (Forwarder)" value={form.forwarder} placeholder="เช่น Sino-Trans" onChange={e=>sf('forwarder',e.target.value)}/>
            <FSelect label="สกุลเงิน" value={form.cur} onChange={e=>sf('cur',e.target.value)}>
              <option value="CNY">CNY ¥</option><option value="USD">USD $</option><option value="THB">THB ฿</option><option value="SGD">SGD S$</option>
            </FSelect>
            <FInput label="มูลค่าสินค้า" value={form.amount} type="number" placeholder="0" onChange={e=>sf('amount',e.target.value)}/>
            <FSelect label="ท่าต้นทาง (Port of Origin)" value={form.origin} onChange={e=>sf('origin',e.target.value)}>
              <option value="">— เลือกท่าต้นทาง —</option>
              {PORTS_ORIGIN.map(p=><option key={p} value={p}>{p}</option>)}
            </FSelect>
            <FSelect label="ท่าปลายทาง (Port of Destination)" value={form.dest} onChange={e=>sf('dest',e.target.value)}>
              <option value="">— เลือกท่าปลายทาง —</option>
              {PORTS_DEST.map(p=><option key={p} value={p}>{p}</option>)}
            </FSelect>
            <FInput label="BL / AWB" value={form.bl} placeholder="—" onChange={e=>sf('bl',e.target.value)}/>
            <FInput label="ตู้คอนเทนเนอร์" value={form.container} placeholder="—" onChange={e=>sf('container',e.target.value)}/>
            <FInput label="ชื่อเรือ (Vessel)" value={form.vessel} placeholder="—" onChange={e=>sf('vessel',e.target.value)}/>
            <FInput label="เที่ยว (Voyage)" value={form.voyage} placeholder="—" onChange={e=>sf('voyage',e.target.value)}/>
            <FInput label="ETD (ออกเดินทาง)" value={form.etd} type="date" onChange={e=>sf('etd',e.target.value)}/>
            <FInput label="ETA (ถึงปลายทาง ประมาณ)" value={form.eta} type="date" onChange={e=>sf('eta',e.target.value)}/>
            <FInput label={form.board==='export'?'วันที่ถึงปลายทางจริง (ถ้ามี)':'วันที่รับเข้าคลังจริง (ถ้ามี)'} value={form.actualDate} type="date" onChange={e=>sf('actualDate',e.target.value)}/>
            <div style={{gridColumn:'1 / -1',height:'1px',background:'#f0e9ed',margin:'2px 0'}}/>
            <FInput label="ค่าขนส่ง (฿)" value={form.freight} type="number" placeholder="0" onChange={e=>sf('freight',e.target.value)}/>
            <FInput label="ค่าเดินพิธีการ (฿)" value={form.clearance} type="number" placeholder="0" onChange={e=>sf('clearance',e.target.value)}/>
            <FInput label="ค่าประกันภัย (฿)" value={form.insurance} type="number" placeholder="0" onChange={e=>sf('insurance',e.target.value)}/>
            <FInput label="อากรขาเข้า (฿)" value={form.duty} type="number" placeholder="0" onChange={e=>sf('duty',e.target.value)}/>
            <FInput label="ภาษีมูลค่าเพิ่ม (฿)" value={form.vat} type="number" placeholder="0" onChange={e=>sf('vat',e.target.value)}/>
          </div>
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #e8dde4',display:'flex',gap:'10px'}}>
          <button onClick={()=>this.setState({creating:false})} style={{flex:1,height:'42px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13.5px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
          <button onClick={()=>this.submitCreate()} style={{flex:2,height:'42px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13.5px',fontWeight:600,cursor:saving?'default':'pointer',opacity:saving?0.75:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'7px'}}><Ico name="check" size={16} sw={2.2}/>{saving?'กำลังบันทึก…':'บันทึก'}</button>
        </div>
      </div>
    </>;
  }

  // ── AI ตรวจเอกสาร: หน้าอัปโหลด + ผลลัพธ์ ──
  renderVerify(){
    const {verifyFiles,verifyLoading,verifyResult,verifyError}=this.state;
    const box={border:'1px solid #e8dde4',borderRadius:'12px',background:'#fff',padding:'20px'};
    return <div style={{flex:1,overflow:'auto',padding:'22px',display:'flex',flexDirection:'column',gap:'16px',maxWidth:'820px'}}>
      <div>
        <div style={{fontSize:'15px',fontWeight:700,color:'#14181f'}}>ตรวจเอกสาร shipment ด้วย AI</div>
        <div style={{fontSize:'12.5px',color:'#7a818d',marginTop:'4px'}}>อัปโหลด Invoice / Packing List / Bill of Lading / Form E-D-AK / ใบขนสินค้าขาเข้า แล้วให้ AI ตรวจไขว้ให้ (รองรับเฉพาะ import ในตอนนี้)</div>
      </div>
      <div style={box}>
        <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();this.onVerifyFilesAdd(e.dataTransfer.files);}}
             style={{border:'2px dashed #e8dde4',borderRadius:'10px',padding:'28px',textAlign:'center'}}>
          <div style={{color:'#7a818d',fontSize:'13px',marginBottom:'10px'}}>ลากไฟล์มาวางที่นี่ หรือ</div>
          <label style={{display:'inline-flex',alignItems:'center',gap:'7px',padding:'8px 16px',borderRadius:'8px',background:'#f3edf0',color:'#c91253',fontSize:'12.5px',fontWeight:600,cursor:'pointer'}}>
            <Ico name="plus" size={14} sw={2}/> เลือกไฟล์
            <input type="file" multiple accept=".pdf,.xlsx,.xls,.csv,.png,.jpg,.jpeg" style={{display:'none'}}
                   onChange={e=>{this.onVerifyFilesAdd(e.target.files);e.target.value='';}}/>
          </label>
        </div>
        {verifyFiles.length>0&&<div style={{marginTop:'14px',display:'flex',flexDirection:'column',gap:'6px'}}>
          {verifyFiles.map((f,i)=><div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 11px',borderRadius:'7px',background:'#f7f3f5',fontSize:'12.5px'}}>
            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
            <button onClick={()=>this.removeVerifyFile(i)} style={{border:0,background:'transparent',color:'#a99fa8',cursor:'pointer',fontSize:'15px',lineHeight:1,padding:'0 4px'}}>×</button>
          </div>)}
        </div>}
        <button onClick={()=>this.submitVerify()} disabled={verifyLoading}
                style={{marginTop:'16px',display:'flex',alignItems:'center',gap:'8px',padding:'10px 20px',border:0,borderRadius:'9px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13px',fontWeight:600,cursor:verifyLoading?'default':'pointer',opacity:verifyLoading?0.75:1}}>
          {verifyLoading&&<span style={{display:'flex',animation:'kobSpin 1s linear infinite'}}><Ico name="sync" size={15} sw={2}/></span>}
          {verifyLoading?'กำลังตรวจสอบ… อาจใช้เวลา 30 วิ - 2 นาที':'เริ่มตรวจสอบ'}
        </button>
      </div>
      {verifyError&&<div style={{...box,borderColor:'#fca5a5',background:'#fef2f2',color:'#dc2626',fontSize:'13px'}}>{verifyError}</div>}
      {verifyResult&&<div style={box}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
          <div style={{fontSize:'13.5px',fontWeight:700,color:'#14181f'}}>ผลตรวจสอบ</div>
          <button onClick={()=>this.exportVerifyExcel()} style={{display:'flex',alignItems:'center',gap:'6px',padding:'6px 13px',borderRadius:'8px',border:'1px solid #e8dde4',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>
            <Ico name="dl" size={14} sw={1.8}/> Export Excel
          </button>
        </div>
        {[
          {icon:'✅',title:'ส่วนที่ถูกต้อง',items:verifyResult.sections.correct,color:'#16a34a'},
          {icon:'🟡',title:'ค่าประมาณการในร่าง / ประเด็นที่ควรตรวจสอบ',items:verifyResult.sections.review,color:'#d97706'},
          {icon:'❌',title:'ข้อผิดพลาดที่ต้องแก้ไข',items:verifyResult.sections.errors,color:'#dc2626'},
        ].map((sec,i)=><div key={i} style={{marginBottom:'16px'}}>
          <div style={{fontSize:'12.5px',fontWeight:700,color:sec.color,marginBottom:'7px'}}>{sec.icon} {sec.title} ({sec.items.length})</div>
          {sec.items.length?<ul style={{margin:0,paddingLeft:'20px',display:'flex',flexDirection:'column',gap:'5px'}}>
            {sec.items.map((t,j)=><li key={j} style={{fontSize:'12.5px',color:'#3a4150'}}>{t}</li>)}
          </ul>:<div style={{fontSize:'12px',color:'#a99fa8'}}>— ไม่มี —</div>}
        </div>)}
        <div>
          <div style={{fontSize:'12.5px',fontWeight:700,color:'#14181f',marginBottom:'7px'}}>📋 สรุป + ข้อเสนอแนะ</div>
          <div style={{fontSize:'12.5px',color:'#3a4150',lineHeight:1.6}}>{verifyResult.summary}</div>
        </div>
        {verifyResult.meta&&verifyResult.meta.filesSkipped&&verifyResult.meta.filesSkipped.length>0&&<div style={{marginTop:'14px',padding:'10px 12px',borderRadius:'7px',background:'#fffbeb',fontSize:'11.5px',color:'#92400e'}}>
          ข้ามไฟล์ {verifyResult.meta.filesSkipped.length} ไฟล์: {verifyResult.meta.filesSkipped.map(f=>f.name+' ('+f.reason+')').join(', ')}
        </div>}
      </div>}
    </div>;
  }

  render(){
    const {tab,view,toast}=this.state;
    const isBoard=tab==='import'||tab==='export';
    return <div style={{display:'flex',flexDirection:'column',height:'100vh',width:'100%',overflow:'hidden',background:'#f7f3f5'}}>
      {this.renderTopbar()}
      {this.renderTabs()}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
        {isBoard&&<>
          {this.renderToolbar(tab)}
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
            {view==='kanban'?this.renderKanban(tab):this.renderTable(tab)}
          </div>
        </>}
        {tab==='dashboard'&&this.renderDashboard()}
        {tab==='verify'&&this.renderVerify()}
      </div>
      {this.renderDetail()}
      {this.renderCreateForm()}
      {this.state.alertsOpen&&this.renderAlerts()}
      {toast&&<div style={{position:'fixed',bottom:'24px',right:'24px',zIndex:80,display:'flex',alignItems:'center',gap:'9px',padding:'12px 16px',borderRadius:'11px',background:toast.kind==='error'?'#dc2626':toast.kind==='success'?'#16a34a':'#14181f',color:'#fff',fontSize:'13px',fontWeight:500,boxShadow:'0 14px 40px rgba(20,24,31,.24)',maxWidth:'360px',animation:'kobFadeIn .2s ease'}}>{toast.msg}</div>}
    </div>;
  }
}

function SectionTitle({children}){
  return <div style={{fontSize:'11px',fontWeight:700,color:'#a99fa8',letterSpacing:'.6px',textTransform:'uppercase',paddingBottom:'9px',borderBottom:'1px solid #e8dde4',marginBottom:'13px'}}>{children}</div>;
}
function Row({label,value}){
  return <div style={{display:'flex',justifyContent:'space-between',gap:'12px'}}>
    <span style={{fontSize:'12.5px',color:'#7a818d'}}>{label}</span>
    <span style={{fontSize:'12.5px',color:'#14181f',fontWeight:500,textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{value}</span>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
