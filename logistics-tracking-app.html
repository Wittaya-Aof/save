// ── มาตรฐาน Transit KPI (Total Lead Time = Transit port-to-port + Customs + Inland) หน่วย=วัน ──
// อ้างอิงจาก Import_Transit_KPI_Standard.xlsx sheet "KPI Standard — FCL/LCL" (ทบทวนล่าสุด ก.ค. 2569
// ดู sheet "Review 2026" ในไฟล์เดียวกันสำหรับปัจจัยฤดูกาล/ความเสี่ยงที่ควรบวกเพิ่ม)
// match = คำที่ค้นใน PORTS_ORIGIN แบบ case-insensitive substring — ครอบคลุม 7 ท่าที่มีข้อมูลยืนยัน
// (ไม่รวม SHANTOU — ยังไม่มีข้อมูลอ้างอิงเฉพาะ จะไม่แสดง KPI ให้ท่านี้เพื่อไม่เดาตัวเลข)
const PORT_KPI = [
  {match:['SHEKOU','NANSHA'],  label:'Shekou / Nansha',      fcl:9,  lcl:12},
  {match:['SHENZHEN'],         label:'Shenzhen (Yantian)',   fcl:11, lcl:14},
  {match:['GUANGZHOU','ZHUHAI'],label:'Guangzhou / Zhuhai',  fcl:12, lcl:15},
  {match:['NINGBO'],           label:'Ningbo',               fcl:14, lcl:17},
  {match:['SHANGHAI'],         label:'Shanghai',             fcl:15, lcl:18},
  {match:['QINGDAO'],          label:'Qingdao',               fcl:16, lcl:19},
  {match:['PUSAN','BUSAN'],    label:'Busan, Korea',         fcl:14, lcl:17}
];
function findPortKpi(origin){
  const o=(origin||'').toUpperCase();
  return PORT_KPI.find(p=>p.match.some(m=>o.includes(m)))||null;
}
// คืนมาตรฐานวัน ตาม origin + ประเภทตู้ (FCL20/FCL40 ถือเป็น FCL เดียวกันตาม Excel, LCL แยก)
function kpiStandardDays(origin,seaType){
  const p=findPortKpi(origin);if(!p)return null;
  return {days:seaType==='LCL'?p.lcl:p.fcl,label:p.label};
}
// Transit Time จริง: ETD -> วันที่รับเข้าคลังจริง (actualDate) + เทียบมาตรฐาน (import + sea เท่านั้น
// เพราะ Excel มาตรฐานครอบคลุมเฉพาะ sea freight ขาเข้า)
function transitInfo(s){
  if(!s||!s.etd||!s.actualDate)return null;
  const d1=new Date(s.etd),d2=new Date(s.actualDate);
  if(isNaN(d1)||isNaN(d2))return null;
  const days=Math.round((d2-d1)/86400000);
  if(days<0)return null;
  const kpi=(s._board==='import'&&s.mode==='sea')?kpiStandardDays(s.origin,s.seaType):null;
  return {days,kpi};
}
function shipModeLabel(s){
  if(s.mode==='air')return 'Air Freight';
  if(s.mode==='courier')return 'Courier'+(s.courierCo?' · '+s.courierCo:'');
  const st=(SEA_TYPES.find(t=>t.key===s.seaType)||{}).label;
  return 'Sea Freight'+(st?' · '+st:'')+((s.seaType==='FCL20'||s.seaType==='FCL40')&&s.containerQty?' × '+s.containerQty:'');
}

const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmtDate(d){
  if(!d) return '—';
  const p=String(d).slice(0,10).split('-');
  if(p.length<3||!p[1]) return '—';
  return parseInt(p[2])+' '+MONTHS[parseInt(p[1])-1]+' '+(parseInt(p[0])+543-2500);
}
function fmtBaht(v){return '฿'+Math.round(v||0).toLocaleString('en-US');}
function fmtAmt(v,cur){
  const sym={CNY:'¥',USD:'$',THB:'฿',SGD:'S$'}[cur]||'';
  return sym+Math.round(v||0).toLocaleString('en-US');
}
function rateGuess(cur){return ({CNY:4.77,USD:33.3,SGD:25.4,THB:1})[cur]||1;}
// fetch ที่มี timeout จริง — เดิม fetch() ไม่มี timeout ในตัว ถ้าเครือข่ายไป Odoo ค้าง
// (ไม่ reject ไม่ resolve) หน้าจอจะค้าง "กำลังโหลด…" ไปเรื่อยๆ โดยไม่มี error ให้เห็น
function fetchTimeout(url,opts,ms){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),ms||12000);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(t));
}
function stageMeta(tab,key){const list=tab==='export'?EXP_STAGES:IMP_STAGES;return list.find(s=>s.key===key)||list[0];}
function typeMeta(t){
  return ({oversea:{label:'Oversea',bg:'#dbeafe',color:'#1d4ed8'},pk:{label:'Packaging',bg:'#ffedd5',color:'#c2410c'},fg:{label:'Finished',bg:'#ede9fe',color:'#6d28d9'}})[t]||{label:'Oversea',bg:'#dbeafe',color:'#1d4ed8'};
}
function normType(t){t=(t||'').toLowerCase();if(t==='pk'||t==='fg'||t==='oversea')return t;return 'oversea';}
function coBadgeSty(co){const kob=co==='KOB';return {display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:'6px',fontSize:'10.5px',fontWeight:700,background:kob?'#fce7f3':'#ede9fe',color:kob?'#c91253':'#6d28d9'};}
function billCatLabel(c){return ({freight:'ค่าขนส่ง',clearance:'พิธีการ',insurance:'ประกันภัย',duty:'อากร',vat:'VAT'})[c]||'อื่นๆ';}
// สถานะดิบจาก Odoo — แสดงคู่กับสถานะที่ระบบตีความ (stage) เพื่อให้ตรวจสอบไขว้กันได้
function odooStateLabel(s){return ({draft:'ร่าง (draft)',sent:'ส่ง RFQ แล้ว',to_approve:'รออนุมัติ',purchase:'ยืนยันแล้ว (purchase)',done:'ล็อกแล้ว (done)',cancel:'ยกเลิก'})[s]||s||'—';}
function receiptStatusLabel(s){return ({pending:'ยังไม่รับของ',partial:'รับบางส่วน',full:'รับครบแล้ว'})[s]||s||'—';}
// สถานะย่อยจาก Odoo แบบสั้น สำหรับแสดงบนการ์ด — บอกว่า PO ยืนยันหรือยัง/รับของหรือยัง
// ช่วยแยกแยะ PO ที่อยู่คอลัมน์เดียวกันว่าจริงๆ คืบหน้าต่างกันแค่ไหน
function poStatusMini(s){
  const parts=[];
  const st={draft:'RFQ ร่าง',sent:'ส่ง PO แล้ว',to_approve:'รออนุมัติ',purchase:'PO ยืนยันแล้ว',done:'ปิด PO',cancel:'ยกเลิก'}[s._odooState];
  if(st)parts.push(st);
  const rc={partial:'รับของบางส่วน',full:'รับของครบ'}[s._receiptStatus];
  if(rc)parts.push(rc);
  return parts.join(' · ');
}
function poStatusColor(s){
  if(s._receiptStatus==='full')return '#16a34a';
  if(s._receiptStatus==='partial')return '#d97706';
  if(s._odooState==='purchase'||s._odooState==='done')return '#2563eb';
  if(s._odooState==='draft'||s._odooState==='sent')return '#94a3b8';
  return '#94a3b8';
}
function billCatSty(c){const m=({freight:{bg:'#dbeafe',fg:'#1d4ed8'},clearance:{bg:'#fae8ff',fg:'#a21caf'},insurance:{bg:'#ccfbf1',fg:'#0f766e'},duty:{bg:'#ffedd5',fg:'#c2410c'},vat:{bg:'#dcfce7',fg:'#15803d'}})[c]||{bg:'#f3edf0',fg:'#7a818d'};return {display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:m.bg,color:m.fg};}
// ต้นทุนนำเข้ารวมของ shipment (ไม่รวมมูลค่าสินค้า)
function costSum(s){return (s.freight||0)+(s.clearance||0)+(s.insurance||0)+(s.duty||0)+(s.vat||0);}
// ต้นทุนรวมแปลงเป็นบาท (มูลค่าสินค้า + ต้นทุนนำเข้า) — ใช้ทั้งตารางต้นทุนและ Dashboard
function totalCostThb(s){return (s.amount||0)*(s.rate||0)+costSum(s);}
// สรุปผล Transit Time เทียบ KPI สำหรับ import + sea freight เท่านั้น (ตรงกับที่มีมาตรฐานอ้างอิง)
// onTime/late นับเฉพาะรายการที่มี ETD + วันที่รับจริง + มีมาตรฐานให้เทียบ (findPortKpi เจอ)
function transitStats(list){
  let onTime=0,late=0,noData=0;
  list.forEach(s=>{
    const ti=transitInfo(s);
    if(!ti||!ti.kpi){noData++;return;}
    if(ti.days<=ti.kpi.days)onTime++;else late++;
  });
  return {onTime,late,noData,measured:onTime+late};
}
// ปีจากวันที่ ETD (ถ้าไม่มีใช้ ETA) — ใช้จัดกลุ่มสรุปค่าใช้จ่ายรายปี/ไตรมาส
function yearOf(s){
  const d=new Date(s.etd||s.eta||s.orderDate||'');
  return isNaN(d)?null:d.getFullYear();
}
// ไตรมาสแบบ 3 ช่วง/ปี (Q1=ม.ค.-เม.ย., Q2=พ.ค.-ส.ค., Q3=ก.ย.-ธ.ค.) ตามที่กำหนด
function quarterOf(s){
  const d=new Date(s.etd||s.eta||s.orderDate||'');
  if(isNaN(d))return null;
  const y=d.getFullYear(),m=d.getMonth()+1,q=m<=4?1:m<=8?2:3;
  return {y,q,key:y+'-Q'+q,label:'Q'+q+'/'+(y+543-2500)};
}

const INP={width:'100%',height:'38px',padding:'0 11px',border:'1.5px solid #e8dde4',borderRadius:'9px',fontFamily:'inherit',fontSize:'13px',color:'#14181f',outline:'none',background:'#fff'};
const SEL={...INP,cursor:'pointer',padding:'0 9px'};

function Field({label,children}){return <div><label style={{display:'block',fontSize:'11px',fontWeight:600,color:'#7a818d',marginBottom:'5px'}}>{label}</label>{children}</div>;}
function FInput({label,...p}){return <Field label={label}><input style={INP} {...p}/></Field>;}
function FSelect({label,value,onChange,children}){return <Field label={label}><select style={SEL} value={value} onChange={onChange}>{children}</select></Field>;}
// กลุ่มช่อง Ship Mode ที่ใช้ร่วมกันทั้งฟอร์มสร้าง/แก้ไข — เปลี่ยน Ship Mode แล้วโชว์ช่องย่อยตามประเภท
// v = {mode,seaType,containerQty,courierCo} ปัจจุบัน, set(key,val) = setter ของฟอร์มนั้น
function ShipModeFields({v,set}){
  const isFcl=v.seaType==='FCL20'||v.seaType==='FCL40';
  return <>
    <FSelect label="Ship Mode (รูปแบบขนส่ง)" value={v.mode||'sea'} onChange={e=>set('mode',e.target.value)}>
      {SHIP_MODES.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
    </FSelect>
    {v.mode==='sea'&&<FSelect label="Sea Type" value={v.seaType||''} onChange={e=>set('seaType',e.target.value)}>
      <option value="">— เลือกประเภทตู้ —</option>
      {SEA_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
    </FSelect>}
    {v.mode==='sea'&&isFcl&&<FInput label="จำนวนตู้คอนเทนเนอร์" type="number" min="1" placeholder="เช่น 1" value={v.containerQty||''} onChange={e=>set('containerQty',e.target.value)}/>}
    {v.mode==='courier'&&<FSelect label="บริษัทขนส่งพัสดุ (Courier)" value={v.courierCo||''} onChange={e=>set('courierCo',e.target.value)}>
      <option value="">— เลือก Courier —</option>
      {COURIERS.map(c=><option key={c} value={c}>{c}</option>)}
    </FSelect>}
  </>;
}

class App extends Component {
  constructor(props){
    super(props);
    const w=typeof window!=='undefined'?window.innerWidth:1280;
    this.state={tab:'import',view:'kanban',co:'',type:'all',query:'',detailId:null,syncing:false,shipments:null,dataSource:'loading',lastSync:'—',creating:false,saving:false,toast:null,form:defaultForm('import'),editing:false,editForm:null,vendors:null,expenseBusy:false,costSrc:'',savingEdit:false,isNarrow:w<880,billPicker:false,billList:null,billQuery:'',billLoading:false,billError:false,selBills:{},alertsOpen:false};
    this._plan=null; this._overrides={}; this._tt=null; this._fx=null;
  }
  componentDidMount(){
    window.addEventListener('resize',this._onResize=()=>{const n=window.innerWidth<880;if(n!==this.state.isNarrow)this.setState({isNarrow:n});});
    this.loadData();
    // อัปเดตข้อมูลจาก Odoo อัตโนมัติเป็นระยะ — ถ้าตอนนี้อยู่ในโหมด fallback (Odoo เพิ่งหลุด)
    // จะได้กลับมาสถานะ live เองทันทีที่เชื่อมต่อได้ ไม่ต้องรอผู้ใช้กด Sync เอง
    // ข้ามไปถ้ากำลังแก้ไข/เปิด picker อยู่ กันข้อมูลกระตุกระหว่างพิมพ์
    this._autoRefresh=setInterval(()=>{
      if(this.state.syncing||this.state.editing||this.state.creating||this.state.billPicker)return;
      this.loadData();
    },180000); // ทุก 3 นาที
  }
  componentWillUnmount(){window.removeEventListener('resize',this._onResize);clearInterval(this._autoRefresh);}
  nowTime(){const d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+' น.';}

  async loadData(){
    this.setState({dataSource:'loading'});
    const grab=async u=>{const r=await fetchTimeout(u,{headers:{Accept:'application/json'}},12000);if(!r.ok)throw 0;return r.json();};
    // อัตราแลกเปลี่ยนล่าสุดจาก Odoo (ใช้ตอนสร้างรายการใหม่ — fallback เป็นค่า default ถ้าโหลดไม่ได้)
    if(!this._fx){try{const fx=await grab('/api/fx-rates');if(fx&&fx.ok){const m={};(fx.rows||[]).forEach(r=>{m[r.currency]=r.thb_per_unit;});this._fx=m;}}catch(e){}}
    try{const p=await grab('/api/import-plan');this._plan=(p&&p.ok&&p.rows)?p.rows:null;}catch(e){this._plan=null;}
    let overrides={},trackingRows=null;
    try{const j=await grab('/api/tracking');if(j&&j.ok&&Array.isArray(j.rows)){trackingRows=j.rows;j.rows.forEach(r=>{const k=r.po_so||r.poNo;if(k)overrides[k]=r;});}}catch(e){}
    this._overrides=overrides;
    // ดึง import-pos/export-sos — server เสิร์ฟ snapshot ล่าสุดให้ทันทีถ้า Odoo หลุด
    // (มี flag stale + as_of บอกว่าเป็นข้อมูลสดหรือชุดที่เก็บไว้ และเก็บไว้เมื่อไหร่)
    const force=this._forceSync?'?force=1':'';
    async function fetchLive(){
      const [imp,exp]=await Promise.all([grab('/api/import-pos'+force).catch(()=>null),grab('/api/export-sos'+force).catch(()=>null)]);
      const rows=[];let stale=false,asOf=null;
      if(imp&&imp.rows){imp.rows.forEach(r=>rows.push(this.mapPo(r,'import')));if(imp.stale)stale=true;if(imp.as_of)asOf=imp.as_of;}
      if(exp&&exp.rows){exp.rows.forEach(r=>rows.push(this.mapPo(r,'export')));if(exp.stale)stale=true;}
      return rows.length?{rows,stale,asOf}:null;
    }
    let res=null;
    try{ res=await fetchLive.call(this); }catch(e){}
    // ถ้าไม่ได้อะไรเลย ลองซ้ำ 1 ครั้ง (network blip)
    if(!res){ await new Promise(r=>setTimeout(r,1500)); try{ res=await fetchLive.call(this); }catch(e){} }
    let base=res?res.rows:null, isLive=res?!res.stale:false;
    this._asOf=res?res.asOf:null;
    // สำรองสุดท้าย: ข้อมูลที่ผู้ใช้เคยแก้เอง (tracking) — ใช้เมื่อไม่มีทั้ง live และ snapshot
    if(!base&&trackingRows&&trackingRows.length)base=trackingRows.map(r=>this.mapTracking(r));
    if(!base){
      if(Array.isArray(this.state.shipments)&&this.state.shipments.length){
        this.showToast('ซิงค์ไม่สำเร็จ — แสดงข้อมูลชุดล่าสุดที่มีอยู่','error');
      } else {
        this.setState({shipments:null,dataSource:'sample'});
      }
      return;
    }
    if(this._plan)base=this.applyPlan(base,this._plan);
    base=this.applyOverrides(base);
    this.setState({shipments:base,dataSource:isLive?'live':'fallback',lastSync:this.nowTime()});
  }

  strip(k){return(k||'').replace(/\s*\(\d+\)\s*$/,'').trim();}
  applyOverrides(rows){
    const ov=this._overrides;if(!ov||!Object.keys(ov).length)return rows;
    const idx={};Object.keys(ov).forEach(k=>{const n=this.strip(k);if(!idx[n])idx[n]=ov[k];});
    return rows.map(s=>{const o=ov[s.poNo]||idx[this.strip(s.poNo)];return o?this.applyOne(s,o):s;});
  }
  applyOne(s,o){
    const m={...s};
    ['origin','dest','bl','container','vessel','forwarder','etd','eta','note','mode','seaType','courierCo','actualDate'].forEach(k=>{if(o[k]!=null&&o[k]!=='')m[k]=o[k];});
    ['freight','clearance','insurance','duty','vat','containerQty'].forEach(k=>{if(o[k]!=null&&o[k]!=='')m[k]=parseFloat(o[k])||0;});
    if(o.overReceipt!=null)m.overReceipt=!!o.overReceipt;
    if(Array.isArray(o.bills))m.bills=o.bills;
    if(o.stage){
      // Odoo ยืนยันรับของ/ส่งถึงแล้ว (terminal stage) → override เก่าห้ามดึงสถานะถอยหลัง
      const terminal=s._board==='export'?'arrived':'received';
      if(s.stage!==terminal||o.stage===terminal){m.stage=o.stage;m._stageManual=true;}
    }
    m._edited=true; return m;
  }
  applyPlan(rows,plan){
    if(!plan)return rows;
    const idx={};Object.keys(plan).forEach(k=>{const n=this.strip(k);if(!idx[n])idx[n]=plan[k];});
    const num=v=>parseFloat(v)||0;
    return rows.map(s=>{
      const p=plan[s.poNo]||idx[this.strip(s.poNo)];if(!p)return s;
      const m={...s};
      if(!m.freight&&p.freight_thb)m.freight=num(p.freight_thb);
      if(!m.vat&&p.customs_vat)m.vat=num(p.customs_vat);
      if(!m.duty&&p.duty)m.duty=num(p.duty);
      if(!m.forwarder&&p.forwarder)m.forwarder=p.forwarder;
      if(!m.bl&&p.bl_awb)m.bl=p.bl_awb;
      if(!m.origin&&p.origin)m.origin=p.origin;
      if(!m.etd&&p.etd)m.etd=p.etd;
      if(!m.eta&&p.eta)m.eta=p.eta;
      if(p.mode)m.mode=/air/i.test(p.mode)?'air':'sea';
      m._plan=true; return m;
    });
  }
  _today(){const d=new Date();d.setHours(0,0,0,0);return d;}
  _dt(s){if(!s)return null;const d=new Date(String(s).slice(0,10));return isNaN(d)?null:d;}
  planFor(poNo){
    if(!this._plan||!poNo)return null;
    if(this._plan[poNo])return this._plan[poNo];
    const b=this.strip(poNo);if(this._plan[b])return this._plan[b];
    for(const k in this._plan){if(this.strip(k)===b)return this._plan[k];}
    return null;
  }
  deriveImportStage(r){
    const rs=r.receipt_status,os=r.odoo_state;
    if(rs==='full')return 'received';if(rs==='partial')return 'customs';
    const today=this._today(),p=this.planFor(r.po_number||r.po_so)||{};
    const etd=this._dt(p.etd),eta=this._dt(p.eta),atd=this._dt(p.atd);
    if(eta&&eta<=today)return 'arrived';
    if((atd&&atd<=today)||(etd&&etd<=today))return 'transit';
    if(p.bl_awb||p.forwarder||etd||eta)return 'booking';
    if(os==='draft'||os==='sent')return 'po';
    const planned=this._dt(r.date_planned);
    if(planned){const days=Math.round((planned-today)/86400000);if(days<=0)return 'arrived';if(days<=10)return 'transit';if(days<=30)return 'booking';}
    return 'po';
  }
  deriveExportStage(r){
    const ds=r.delivery_status,os=r.odoo_state;if(ds==='full')return 'arrived';
    const p=this.planFor(r.so_number||r.po_so)||{},today=this._today();
    const etd=this._dt(p.etd),atd=this._dt(p.atd);
    if((atd&&atd<=today)||(etd&&etd<=today)||ds==='partial')return 'shipped';
    if(p.bl_awb||p.forwarder||etd)return 'booking';
    const ordered=this._dt(r.date_order);
    if(ordered&&Math.round((today-ordered)/86400000)>=14)return 'booking';
    if(os==='sale'||os==='done')return 'packing';
    return 'draft';
  }
  mapPo(r,board){
    const stage=board==='export'?this.deriveExportStage(r):this.deriveImportStage(r);
    const rate=parseFloat(r.currency_rate)||0;
    // orderDate = po.date_order/so.date_order — มีให้ทั้ง import/export เสมอ ใช้เป็น fallback
    // จัดกลุ่มปี/ไตรมาสเมื่อยังไม่มี etd/eta (โดยเฉพาะ export ที่ SQL ไม่มี date_planned เลย
    // ทำให้ eta ว่างเปล่าตลอด — ไม่มี orderDate ตัวนี้ export จะกลุ่มปีไม่ได้เลยสักรายการ)
    return {_board:board,id:board[0]+(r.id||''),poNo:r.po_number||r.so_number||('#'+r.id),company:r.company_code||'KOB',party:r.supplier||r.customer||'—',type:normType(''),mode:'sea',seaType:'',containerQty:0,courierCo:'',stage,cur:r.currency||'THB',amount:parseFloat(r.amount_total)||0,rate:rate>0?1/rate:1,origin:r.origin||'',dest:board==='export'?(r.country_code||'ต่างประเทศ'):'LAEM CHABANG, THAILAND',etd:'',eta:(r.date_planned||'').slice(0,10),orderDate:(r.date_order||'').slice(0,10),actualDate:'',bl:'',container:'',vessel:'',forwarder:'',freight:0,clearance:0,insurance:0,duty:0,vat:0,
      _odooState:r.odoo_state||'',_receiptStatus:r.receipt_status||r.delivery_status||''};
  }
  mapTracking(r){
    // _board คือ field ที่ code ปัจจุบันเขียนจริง — r.type เป็น field เก่าที่คาบเกี่ยวความหมายกับ
    // "ประเภทสินค้า" (oversea/pk/fg) ใช้เป็น fallback สำหรับ record เก่าเท่านั้น
    const board=(r._board||r.type)==='export'?'export':'import';
    const wf=(r.state&&r.state!=='draft')?r.state:r.odoo_state;
    const stageMap=board==='export'?{draft:'draft',sent:'draft',order_confirmed:'packing',production:'packing',packing:'packing',booking_confirmed:'booking',etd:'shipped',sale:'shipped',eta_arrived:'arrived',closed:'arrived',done:'arrived'}:{draft:'po',purchase:'po',sent:'po',booking_confirmed:'booking',etd:'transit',atd:'transit',eta:'arrived',ata:'arrived',customs_clearance:'customs',duty_payment:'customs',goods_received:'received',done:'received'};
    const stage=r.stage||stageMap[wf]||(board==='export'?'draft':'po');
    const odooRate=parseFloat(r.rate)||0;
    // id ต้องไม่มีวันเป็น undefined — record ที่บันทึกผ่านฟอร์มแก้ไข/สร้างในแอปไม่มี r.id/r.odoo_id
    // (มีแค่ po_so) ถ้าปล่อยเป็น undefined หลาย record จะชนกัน ทำให้คลิกแล้วเปิดผิด PO
    const id=r.id||r.odoo_id||('t_'+(r.po_so||Math.random()));
    return {_board:board,id,poNo:r.po_so||r.odoo_id||r.id,company:r.company||'KOB',party:r.party||'—',type:normType(r.import_type),mode:r.mode||'sea',seaType:r.seaType||'',containerQty:parseFloat(r.containerQty)||0,courierCo:r.courierCo||'',stage,cur:r.currency||'THB',amount:parseFloat(r.amount_total)||0,rate:odooRate>0?1/odooRate:1,origin:r.origin||'',dest:r.dest||'LAEM CHABANG, THAILAND',etd:(r.etd||'').slice(0,10),eta:(r.eta||'').slice(0,10),actualDate:(r.actualDate||'').slice(0,10),bl:r.bl_awb||'',container:r.container||'',vessel:[r.vessel,r.voyage].filter(Boolean).join(' / '),forwarder:r.forwarder||'',freight:parseFloat(r.freight_thb||r.freight||0)||0,clearance:parseFloat(r.clearance)||0,insurance:parseFloat(r.insurance)||0,duty:parseFloat(r.duty)||0,vat:parseFloat(r.vat)||0,_fallback:true};
  }

  allShipments(){const s=this.state.shipments;return Array.isArray(s)?s:sampleImports().concat(sampleExports());}
  imports(){return this.allShipments().filter(s=>s._board==='import');}
  exports(){return this.allShipments().filter(s=>s._board==='export');}
  filtered(tab){
    const {co,type,query}=this.state;
    let list=tab==='export'?this.exports():this.imports();
    if(co)list=list.filter(s=>s.company===co);
    if(tab==='import'&&type!=='all')list=list.filter(s=>s.type===type);
    const q=(query||'').trim().toLowerCase();
    if(q)list=list.filter(s=>(s.poNo+' '+s.party+' '+(s.bl||'')).toLowerCase().includes(q));
    return list;
  }

  showToast(msg,kind){this.setState({toast:{msg,kind:kind||'info'}});clearTimeout(this._tt);this._tt=setTimeout(()=>this.setState({toast:null}),3600);}

    this.setState({shipments:[ns].concat(this.allShipments()),creating:false,tab:f.board,view:'kanban'});
    const ov={...this._overrides};
    ov[ns.poNo]={po_so:ns.poNo,_board:f.board,_edited:true,_ts:Date.now(),type:f.board,company:f.company,party:f.party,stage:ns.stage,mode:f.mode,seaType:f.seaType||'',containerQty:parseFloat(f.containerQty)||0,courierCo:f.courierCo||'',origin:f.origin||'',dest:f.dest||'',bl:f.bl||'',container:f.container||'',vessel:f.vessel||'',forwarder:f.forwarder||'',etd:f.etd||'',eta:f.eta||'',actualDate:f.actualDate||'',freight:parseFloat(f.freight)||0,clearance:parseFloat(f.clearance)||0,insurance:parseFloat(f.insurance)||0,duty:parseFloat(f.duty)||0,vat:parseFloat(f.vat)||0};

    this.setState({editing:true,editForm:ef,costSrc:'',selBills:{}});this.loadVendors();

  cancelEdit(){this.setState({editing:false,editForm:null,costSrc:''});}
  setEdit(k,v){this.setState(s=>({editForm:{...s.editForm,[k]:v}}));}
  // ติ๊ก Over-receipt = ของถึงโกดังจริงแล้ว → ปิดงานทันที (ไม่ต้องไล่ผ่าน booking/customs)
  // ปลดติ๊ก = ไม่บังคับสถานะคืน ให้ผู้ใช้เลือกเอง เพราะไม่รู้ว่าที่ถูกต้องคือขั้นไหน
  toggleOverReceipt(checked){
    this.setState(s=>{
      const ef={...s.editForm,overReceipt:checked};
      if(checked){
        ef.stage=ef.board==='export'?'arrived':'received';
        if(!ef.actualDate)ef.actualDate=new Date().toISOString().slice(0,10);
      }
      return {editForm:ef};
    });
  }
  async loadVendors(){
    if(this.state.vendors)return;
    try{const r=await fetch('/api/vendors',{headers:{Accept:'application/json'}});const j=await r.json();this.setState({vendors:j&&j.rows?j.rows:[]});}
    catch(e){this.setState({vendors:[]});}
  }
  // ── เปิดรายการบิลขนส่ง/ศุลกากร ให้ผู้ใช้เลือกจับคู่ ──
  async openBillPicker(){
    const f=this.state.editForm;if(!f)return;
    // preselect บิลที่เคยจับคู่ไว้
    const sel={};(f.bills||[]).forEach(b=>{sel[b.id]=b;});
    this.setState({billPicker:true,billQuery:'',selBills:sel,billError:false});
    // cache แยกตามบริษัท — เดิมเช็คแค่ "มีลิสต์อยู่แล้วหรือยัง" ทำให้เปิด BTV ต่อจาก KOB
    // เห็นบิลของ KOB ค้างอยู่ (ผิดบริษัท)
    if(this.state.billList&&this.state.billList.length&&this._billListCompany===f.company){return;}
    this.setState({billLoading:true});
    try{
      const r=await fetchTimeout('/api/logistics-bills?company='+encodeURIComponent(f.company)+'&months=12',{headers:{Accept:'application/json'}},15000);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const j=await r.json();
      this._billListCompany=f.company;
      this.setState({billList:(j&&j.bills)||[],billLoading:false});
    }catch(e){
      this.setState({billList:[],billLoading:false,billError:true});
      this.showToast(e.name==='AbortError'?'เชื่อมต่อ Odoo ไม่ทันเวลา — ลองใหม่อีกครั้ง':'โหลดรายการบิลไม่สำเร็จ','error');
    }
  }
  closeBillPicker(){this.setState({billPicker:false});}
  toggleBill(b){this.setState(s=>{const sel={...s.selBills};if(sel[b.id])delete sel[b.id];else sel[b.id]=b;return {selBills:sel};});}
  // ใช้บิลที่เลือก: รวม freight/duty/vat เติมลงช่อง + จำการจับคู่ไว้
  applySelectedBills(){
    const sel=Object.values(this.state.selBills||{});
    let freight=0,clearance=0,insurance=0,duty=0,vat=0;
    sel.forEach(b=>{freight+=b.freight||0;clearance+=b.clearance||0;insurance+=b.insurance||0;duty+=b.duty||0;vat+=b.vat||0;});
    const meta=sel.map(b=>({id:b.id,kind:b.kind||'bill',bill:b.bill,partner:b.partner,amount:b.amount,category:b.category,freight:b.freight||0,clearance:b.clearance||0,insurance:b.insurance||0,duty:b.duty||0,vat:b.vat||0}));
    this.setState(s=>({
      editForm:{...s.editForm,freight:Math.round(freight),clearance:Math.round(clearance),insurance:Math.round(insurance),duty:Math.round(duty),vat:Math.round(vat),bills:meta},
      billPicker:false,
      costSrc:sel.length?('✓ จับคู่ '+sel.length+' รายการจาก Odoo'):''
    }));
    const total=freight+clearance+insurance+duty+vat;
    this.showToast(sel.length?('ใช้ '+sel.length+' รายการ รวม ฿'+Math.round(total).toLocaleString()):'ไม่ได้เลือกบิล',sel.length?'success':'info');
  }
  async saveEdit(){
    const f=this.state.editForm;if(!f||this.state.savingEdit)return;
    this.setState({savingEdit:true});
    const num=v=>(v===''||v==null)?'':parseFloat(v)||0;
    const o={po_so:f.poNo,_board:f.board,_edited:true,_ts:Date.now(),type:f.board,company:f.company,party:f.party,stage:f.stage||'',mode:f.mode||'sea',seaType:f.seaType||'',containerQty:num(f.containerQty),courierCo:f.courierCo||'',origin:f.origin||'',dest:f.dest||'',bl:f.bl||'',bl_awb:f.bl||'',container:f.container||'',vessel:f.vessel||'',forwarder:f.forwarder||'',etd:f.etd||'',eta:f.eta||'',actualDate:f.actualDate||'',freight:num(f.freight),clearance:num(f.clearance),insurance:num(f.insurance),duty:num(f.duty),vat:num(f.vat),bills:Array.isArray(f.bills)?f.bills:[],overReceipt:!!f.overReceipt,note:f.note||''};
    const ov={...this._overrides};ov[f.poNo]=o;this._overrides=ov;
    const rows=this.allShipments().map(s=>s.poNo===f.poNo?this.applyOne(s,o):s);
    this.setState({shipments:rows,editing:false,editForm:null,costSrc:''});
    try{const res=await fetch('/api/tracking/upsert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});this.showToast(res.ok?'บันทึก PO '+f.poNo+' สำเร็จ':'บันทึกไม่สำเร็จ: HTTP '+res.status,res.ok?'success':'error');}
    catch(e){this.showToast('ออฟไลน์ — บันทึกชั่วคราว','info');}
    this.setState({savingEdit:false});
  }
  // กด Sync = ล้าง cache ฝั่ง server ก่อน เพื่อให้ได้ข้อมูลสดจริง (ไม่ติด cache 5 นาที)
  // กด Sync = บังคับ probe Odoo จริง (ข้าม circuit breaker + ล้าง cache ทั้งฝั่ง server)
  sync(){if(this.state.syncing)return;this.setState({syncing:true});this._forceSync=true;fetch('/api/cache/clear').catch(()=>{}).then(()=>this.loadData()).then(()=>{this._forceSync=false;this.setState({syncing:false});}).catch(()=>{this._forceSync=false;this.setState({syncing:false});});}
  // อัตราแลกเปลี่ยน: ใช้ค่าจริงจาก Odoo ก่อน ถ้าไม่มีจึงใช้ค่า default
  fxRate(cur){const v=this._fx&&this._fx[cur];return (v&&v>0)?v:rateGuess(cur);}

  // ── Export Excel: รายการตาม filter ปัจจุบัน + สรุปต้นทุน ──
  exportExcel(tab){
    if(!window.XLSX){this.showToast('ไม่พบไลบรารี Excel (vendor/xlsx.full.min.js)','error');return;}
    const list=this.filtered(tab);
    if(!list.length){this.showToast('ไม่มีรายการให้ export','info');return;}
    const rows=list.map(s=>{
      const ti=transitInfo(s);
      return {
      'PO/SO':s.poNo,'บริษัท':s.company,'ผู้ขาย/ลูกค้า':s.party,
      'ประเภท':typeMeta(s.type).label,'สถานะ':stageMeta(tab,s.stage).label,
      'Ship Mode':shipModeLabel(s),'สกุลเงิน':s.cur,'มูลค่าสินค้า':s.amount,
      'มูลค่าสินค้า (฿)':Math.round(s.amount*s.rate),'ค่าขนส่ง (฿)':s.freight||0,
      'ค่าเดินพิธีการ (฿)':s.clearance||0,'ค่าประกันภัย (฿)':s.insurance||0,
      'อากร (฿)':s.duty||0,'VAT (฿)':s.vat||0,
      'ต้นทุนรวม (฿)':Math.round(s.amount*s.rate+costSum(s)),
      'ต้นทาง':s.origin,'ปลายทาง':s.dest,'BL/AWB':s.bl,
      'ตู้':s.container,'เรือ/เที่ยว':s.vessel,'Forwarder':s.forwarder,
      'ETD':s.etd,'ETA (ประมาณ)':s.eta,'วันที่รับจริง/ถึงจริง':s.actualDate||'',
      'Transit จริง (วัน)':ti?ti.days:'','KPI มาตรฐาน (วัน)':ti&&ti.kpi?ti.kpi.days:'',
      'ผลเทียบ KPI':ti&&ti.kpi?(ti.days-ti.kpi.days<=0?'ตรง/เร็วกว่า':('ล่าช้า '+(ti.days-ti.kpi.days)+' วัน')):'',
    };});
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=Object.keys(rows[0]).map(k=>({wch:Math.max(k.length+2,12)}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,tab==='export'?'Export':'Import');
    const today=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,'logistics-'+tab+'-'+today+'.xlsx');
    this.showToast('ดาวน์โหลด Excel แล้ว ('+list.length+' รายการ)','success');
  }

  // ── รายการต้องติดตาม: ETA เลยกำหนด หรือใกล้ถึงใน 3 วัน ──
  alerts(){
    const today=this._today(),out=[];
    this.imports().forEach(s=>{
      if(s.stage==='received')return;
      const eta=this._dt(s.eta);if(!eta)return;
      const days=Math.round((eta-today)/86400000);
      if(days<0)out.push({s,days,kind:'late'});
      else if(days<=3)out.push({s,days,kind:'soon'});
    });
    this.exports().forEach(s=>{
      if(s.stage==='arrived')return;
      const eta=this._dt(s.eta);if(!eta)return;
      const days=Math.round((eta-today)/86400000);
      if(days<0)out.push({s,days,kind:'late'});
      else if(days<=3)out.push({s,days,kind:'soon'});
    });
    return out.sort((a,b)=>a.days-b.days);
  }
  // ── จัดการด่วนจาก panel แจ้งเตือน ──
  // "รับแล้ว": ปิดงานทันที (import→รับเข้าคลัง / export→ถึงปลายทาง) — บันทึกลง server เลย
  async quickCloseAlert(s){
    const stage=s._board==='export'?'arrived':'received';
    const actualDate=s.actualDate||new Date().toISOString().slice(0,10);
    const o={...(this._overrides[s.poNo]||{}),po_so:s.poNo,_board:s._board,_edited:true,_ts:Date.now(),stage,actualDate};
    this._overrides={...this._overrides,[s.poNo]:o};
    const rows=this.allShipments().map(x=>x.poNo===s.poNo?{...x,stage,actualDate,_stageManual:true,_edited:true}:x);
    this.setState({shipments:rows});
    try{
      const r=await fetch('/api/tracking/upsert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});
      this.showToast(r.ok?('ปิดงาน '+s.poNo+' — '+(s._board==='export'?'ถึงปลายทาง':'รับเข้าคลัง')+'แล้ว'):'บันทึกไม่สำเร็จ',r.ok?'success':'error');
    }catch(e){this.showToast('ออฟไลน์ — บันทึกชั่วคราว','info');}
  }
  // "แก้ ETA": เปิด detail เข้าโหมดแก้ไขทันที (อัปเดตวันจริงจาก forwarder)
  openAlertEdit(s){
    this.setState({alertsOpen:false,tab:s._board,detailId:s.id,editing:false,editForm:null},()=>this.startEdit());
  }

  buildTimeline(s,tab){
    const stages=tab==='export'?EXP_STAGES:IMP_STAGES;
    const curIdx=stages.findIndex(x=>x.key===s.stage);
    const dateFor=k=>({po:'',booking:s.etd,transit:s.etd,arrived:s.eta,customs:s.eta,received:s.eta,draft:'',packing:s.etd,shipped:s.etd})[k];
    return stages.map((st,i)=>{
      const done=i<curIdx,cur=i===curIdx;
      return {key:st.key,label:st.label,done,cur,date:(done||cur)?fmtDate(dateFor(st.key))||'เสร็จสิ้น':'—',color:st.color,showLine:i<stages.length-1};
    });
  }

  renderBillPicker(){
    const {billList,billLoading,billQuery,billError,selBills}=this.state;
    const q=(billQuery||'').trim().toLowerCase();
    const all=billList||[];
    const list=q?all.filter(b=>((b.partner||'')+' '+(b.bill||'')+' '+(b.ref||'')+' '+(b.date||'')).toLowerCase().includes(q)):all;
    // บิลที่ถูกจับคู่กับ shipment อื่นไปแล้ว → เตือนกันต้นทุนนับซ้ำ
    const curPo=this.state.editForm?this.state.editForm.poNo:'';
    const usedBy={};const ovAll=this._overrides||{};
    Object.keys(ovAll).forEach(k=>{if(k===curPo)return;((ovAll[k]&&ovAll[k].bills)||[]).forEach(b=>{if(b&&b.id!=null&&!usedBy[b.id])usedBy[b.id]=k;});});
    const sel=selBills||{};
    const selArr=Object.values(sel);
    const sums={freight:0,clearance:0,insurance:0,duty:0,vat:0};
    selArr.forEach(b=>{Object.keys(sums).forEach(k=>{sums[k]+=b[k]||0;});});
    const sumAll=sums.freight+sums.clearance+sums.insurance+sums.duty+sums.vat;
    return <>
      <div onClick={()=>this.closeBillPicker()} style={{position:'fixed',inset:0,background:'rgba(20,24,31,.45)',zIndex:70,animation:'kobFadeIn .2s ease'}}/>
      <div style={{position:'fixed',top:0,right:0,bottom:0,width:'520px',maxWidth:'96vw',background:'#fff',zIndex:71,boxShadow:'-12px 0 40px rgba(20,24,31,.18)',display:'flex',flexDirection:'column',animation:'kobSlideIn .26s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{padding:'20px 22px 14px',borderBottom:'1px solid #e8dde4'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <div><div style={{fontSize:'16px',fontWeight:700,color:'#14181f'}}>เลือกบิลค่าขนส่ง / ภาษี</div>
              <div style={{fontSize:'11.5px',color:'#a99fa8',marginTop:'2px'}}>จาก Odoo · เลือกบิลที่เป็นของ shipment นี้ (เลือกได้หลายใบ)</div></div>
            <button onClick={()=>this.closeBillPicker()} style={{marginLeft:'auto',display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',borderRadius:'9px',border:'1px solid #e8dde4',background:'#fff',color:'#7a818d',cursor:'pointer',flexShrink:0}}><Ico name="close" size={16} sw={1.9}/></button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#faf6f8',border:'1.5px solid #e8dde4',borderRadius:'9px',padding:'0 12px',height:'38px',marginTop:'14px'}}>
            <span style={{display:'flex',color:'#a99fa8'}}><Ico name="search" size={16} sw={1.8}/></span>
            <input value={billQuery} onChange={e=>this.setState({billQuery:e.target.value})} placeholder="ค้นหา ผู้ขาย / เลขบิล / วันที่…" style={{border:0,outline:0,background:'transparent',fontFamily:'inherit',fontSize:'13px',color:'#14181f',width:'100%'}}/>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
          {billLoading&&<div style={{textAlign:'center',color:'#a99fa8',fontSize:'13px',padding:'40px 0'}}>กำลังโหลดบิลจาก Odoo… (ไม่เกิน 15 วินาที)</div>}
          {!billLoading&&billError&&<div style={{textAlign:'center',padding:'40px 0'}}>
            <div style={{color:'#b91c1c',fontSize:'13px',marginBottom:'12px'}}>เชื่อมต่อ Odoo ไม่สำเร็จ</div>
            <button onClick={()=>{this._billListCompany=null;this.openBillPicker();}} style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'8px 16px',border:'1.5px solid #c91253',borderRadius:'9px',background:'#fff',color:'#c91253',fontFamily:'inherit',fontSize:'12.5px',fontWeight:600,cursor:'pointer'}}><Ico name="sync" size={13} sw={2}/>ลองอีกครั้ง</button>
          </div>}
          {!billLoading&&!billError&&list.length===0&&<div style={{textAlign:'center',color:'#bcb2ba',fontSize:'13px',padding:'40px 0'}}>ไม่พบบิล{q?'ที่ตรงกับคำค้น':''}</div>}
          {!billLoading&&list.map(b=>{
            const on=!!sel[b.id];
            const used=usedBy[b.id];
            return <div key={b.id} onClick={()=>this.toggleBill(b)} style={{display:'flex',alignItems:'center',gap:'11px',padding:'11px 12px',marginBottom:'7px',border:on?'1.5px solid #c91253':'1.5px solid #ece3e8',borderRadius:'11px',background:on?'#fdf2f8':(used?'#fffbeb':'#fff'),cursor:'pointer',opacity:used&&!on?0.75:1}}>
              <span style={{width:'20px',height:'20px',borderRadius:'6px',border:on?'0':'1.5px solid #d9d0d6',background:on?'#c91253':'#fff',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{on&&<Ico name="check" size={13} sw={2.6}/>}</span>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:'12.5px',fontWeight:600,color:'#14181f',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.partner}</div>
                <div style={{display:'flex',alignItems:'center',gap:'7px',marginTop:'3px',flexWrap:'wrap'}}>
                  <span style={billCatSty(b.category)}>{billCatLabel(b.category)}</span>
                  <span style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:b.kind==='po'?'#f3edf0':'#dcfce7',color:b.kind==='po'?'#7a818d':'#15803d'}}>{b.kind==='po'?'PO รอบิล':'จ่ายจริง'}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'10.5px',color:'#a99fa8'}}>{b.bill}</span>
                  <span style={{fontSize:'10.5px',color:'#a99fa8'}}>· {fmtDate(b.date)}</span>
                  {used&&<span style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',borderRadius:'5px',fontSize:'10px',fontWeight:700,background:'#fef3c7',color:'#b45309'}}>ใช้กับ {used} แล้ว</span>}
                </div>
              </div>
              <span style={{fontSize:'13px',fontWeight:700,color:'#14181f',fontVariantNumeric:'tabular-nums',flexShrink:0}}>฿{Math.round(b.amount).toLocaleString()}</span>
            </div>;
          })}
        </div>
        <div style={{padding:'12px 22px 14px',borderTop:'1px solid #e8dde4'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'10px',fontSize:'11px',color:'#7a818d',marginBottom:'10px',flexWrap:'wrap'}}>
            <span style={{fontWeight:600}}>เลือก {selArr.length} รายการ</span>
            <span style={{fontVariantNumeric:'tabular-nums',textAlign:'right'}}>
              {['freight','clearance','insurance','duty','vat'].filter(k=>sums[k]>0).map(k=>billCatLabel(k)+' ฿'+Math.round(sums[k]).toLocaleString()).join(' · ')||'—'}
            </span>
          </div>
          <div style={{display:'flex',gap:'10px'}}>
            <button onClick={()=>this.closeBillPicker()} style={{flex:1,height:'42px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13.5px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
            <button onClick={()=>this.applySelectedBills()} style={{flex:2,height:'42px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13.5px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'7px'}}><Ico name="check" size={16} sw={2.2}/>ใช้รายการที่เลือก (฿{Math.round(sumAll).toLocaleString()})</button>
          </div>
        </div>
      </div>
    </>;
  }

            </FSelect>
            <FInput label="มูลค่าสินค้า" value={form.amount} type="number" placeholder="0" onChange={e=>sf('amount',e.target.value)}/>
            <FSelect label="ท่าต้นทาง (Port of Origin)" value={form.origin} onChange={e=>sf('origin',e.target.value)}>
              <option value="">— เลือกท่าต้นทาง —</option>
              {PORTS_ORIGIN.map(p=><option key={p} value={p}>{p}</option>)}
            </FSelect>
            <FSelect label="ท่าปลายทาง (Port of Destination)" value={form.dest} onChange={e=>sf('dest',e.target.value)}>
              <option value="">— เลือกท่าปลายทาง —</option>
              {PORTS_DEST.map(p=><option key={p} value={p}>{p}</option>)}
            </FSelect>
            <FInput label="BL / AWB" value={form.bl} placeholder="—" onChange={e=>sf('bl',e.target.value)}/>
            <FInput label="ตู้คอนเทนเนอร์" value={form.container} placeholder="—" onChange={e=>sf('container',e.target.value)}/>
            <FInput label="ชื่อเรือ (Vessel)" value={form.vessel} placeholder="—" onChange={e=>sf('vessel',e.target.value)}/>
            <FInput label="เที่ยว (Voyage)" value={form.voyage} placeholder="—" onChange={e=>sf('voyage',e.target.value)}/>
            <FInput label="ETD (ออกเดินทาง)" value={form.etd} type="date" onChange={e=>sf('etd',e.target.value)}/>
            <FInput label="ETA (ถึงปลายทาง ประมาณ)" value={form.eta} type="date" onChange={e=>sf('eta',e.target.value)}/>
            <FInput label={form.board==='export'?'วันที่ถึงปลายทางจริง (ถ้ามี)':'วันที่รับเข้าคลังจริง (ถ้ามี)'} value={form.actualDate} type="date" onChange={e=>sf('actualDate',e.target.value)}/>
            <div style={{gridColumn:'1 / -1',height:'1px',background:'#f0e9ed',margin:'2px 0'}}/>
            <FInput label="ค่าขนส่ง (฿)" value={form.freight} type="number" placeholder="0" onChange={e=>sf('freight',e.target.value)}/>
            <FInput label="ค่าเดินพิธีการ (฿)" value={form.clearance} type="number" placeholder="0" onChange={e=>sf('clearance',e.target.value)}/>
            <FInput label="ค่าประกันภัย (฿)" value={form.insurance} type="number" placeholder="0" onChange={e=>sf('insurance',e.target.value)}/>
            <FInput label="อากรขาเข้า (฿)" value={form.duty} type="number" placeholder="0" onChange={e=>sf('duty',e.target.value)}/>
            <FInput label="ภาษีมูลค่าเพิ่ม (฿)" value={form.vat} type="number" placeholder="0" onChange={e=>sf('vat',e.target.value)}/>
          </div>
        </div>
        <div style={{padding:'14px 22px',borderTop:'1px solid #e8dde4',display:'flex',gap:'10px'}}>
          <button onClick={()=>this.setState({creating:false})} style={{flex:1,height:'42px',border:'1.5px solid #e8dde4',borderRadius:'10px',background:'#fff',color:'#5b6371',fontFamily:'inherit',fontSize:'13.5px',fontWeight:500,cursor:'pointer'}}>ยกเลิก</button>
          <button onClick={()=>this.submitCreate()} style={{flex:2,height:'42px',border:0,borderRadius:'10px',background:'#c91253',color:'#fff',fontFamily:'inherit',fontSize:'13.5px',fontWeight:600,cursor:saving?'default':'pointer',opacity:saving?0.75:1,display:'flex',alignItems:'center',justifyContent:'center',gap:'7px'}}><Ico name="check" size={16} sw={2.2}/>{saving?'กำลังบันทึก…':'บันทึก'}</button>
        </div>
      </div>
    </>;
  }

  render(){
    const {tab,view,toast}=this.state;
    const isBoard=tab==='import'||tab==='export';
    return <div style={{display:'flex',flexDirection:'column',height:'100vh',width:'100%',overflow:'hidden',background:'#f7f3f5'}}>
      {this.renderTopbar()}
      {this.renderTabs()}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
        {isBoard&&<>
          {this.renderToolbar(tab)}
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
            {view==='kanban'?this.renderKanban(tab):this.renderTable(tab)}
          </div>
        </>}
        {tab==='dashboard'&&this.renderDashboard()}
      </div>
      {this.renderDetail()}
      {this.renderCreateForm()}
      {this.state.alertsOpen&&this.renderAlerts()}
      {toast&&<div style={{position:'fixed',bottom:'24px',right:'24px',zIndex:80,display:'flex',alignItems:'center',gap:'9px',padding:'12px 16px',borderRadius:'11px',background:toast.kind==='error'?'#dc2626':toast.kind==='success'?'#16a34a':'#14181f',color:'#fff',fontSize:'13px',fontWeight:500,boxShadow:'0 14px 40px rgba(20,24,31,.24)',maxWidth:'360px',animation:'kobFadeIn .2s ease'}}>{toast.msg}</div>}
    </div>;
  }
}

function SectionTitle({children}){
  return <div style={{fontSize:'11px',fontWeight:700,color:'#a99fa8',letterSpacing:'.6px',textTransform:'uppercase',paddingBottom:'9px',borderBottom:'1px solid #e8dde4',marginBottom:'13px'}}>{children}</div>;
}
function Row({label,value}){
  return <div style={{display:'flex',justifyContent:'space-between',gap:'12px'}}>
    <span style={{fontSize:'12.5px',color:'#7a818d'}}>{label}</span>
    <span style={{fontSize:'12.5px',color:'#14181f',fontWeight:500,textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{value}</span>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
